<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>FreshSpirit - Hồ sơ</title>

  <link rel="stylesheet" href="style.css" />

  <style>
    .profile-card {
      background: #fff;
      border: 2px solid #111;
      border-radius: 32px;
      box-shadow: 0 5px 0 #000;
      padding: 22px;
      text-align: center;
      margin-bottom: 18px;
    }

    .profile-avatar {
      width: 112px;
      height: 112px;
      border: 2px solid #111;
      border-radius: 999px;
      margin: 0 auto 16px;
      background: #f4f4f4;
      overflow: hidden;
      display: grid;
      place-items: center;
      font-size: 46px;
      font-weight: 900;
    }

    .profile-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .profile-card h1 {
      font-size: 28px;
      margin-bottom: 6px;
    }

    .profile-card p {
      font-size: 14px;
      line-height: 1.45;
      font-weight: 700;
      color: #555;
      margin-bottom: 8px;
    }

    .profile-info {
      margin-top: 18px;
      text-align: left;
      display: grid;
      gap: 10px;
    }

    .info-row {
      border: 2px solid #111;
      border-radius: 18px;
      padding: 12px 14px;
      background: #f7f7f7;
    }

    .info-row small {
      display: block;
      font-size: 12px;
      color: #777;
      font-weight: 900;
      margin-bottom: 4px;
    }

    .info-row strong {
      font-size: 15px;
      line-height: 1.35;
    }

    .profile-edit-panel {
      background: #fff;
      border: 2px solid #111;
      border-radius: 32px;
      box-shadow: 0 5px 0 #000;
      padding: 20px;
      margin-bottom: 18px;
    }

    .profile-edit-panel h2 {
      font-size: 24px;
      margin-bottom: 14px;
    }

    .edit-form {
      display: grid;
      gap: 12px;
    }

    .edit-form label {
      text-align: left;
      font-size: 13px;
      font-weight: 900;
    }

    .edit-form input,
    .edit-form select {
      width: 100%;
      height: 50px;
      border: 2px solid #c8c8c8;
      border-radius: 18px;
      padding: 0 14px;
      font-size: 15px;
      font-weight: 800;
      margin-top: 6px;
      background: #fff;
    }

    .readonly-box {
      min-height: 50px;
      border: 2px solid #c8c8c8;
      border-radius: 18px;
      padding: 14px;
      margin-top: 6px;
      background: #efefef;
      font-weight: 900;
      color: #555;
    }

    .two-btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 8px;
    }

    .white-btn {
      width: 100%;
      height: 54px;
      border: 2px solid #111;
      border-radius: 20px;
      background: #fff;
      color: #000;
      font-size: 17px;
      font-weight: 900;
      box-shadow: 0 4px 0 #000;
    }
  </style>
</head>

<body class="app-body">
  <header class="mobile-header fixed-header">
    <div>
      <a href="home.html" class="app-logo">FreshSpirit</a>
      <p>A new place for tarot</p>
    </div>

    <div class="header-actions">
      <button class="icon-btn" onclick="window.location.href='shop.html'">♙</button>
      <button id="heartBtn" class="icon-btn">♡</button>
      <button class="black-btn" onclick="window.location.href='room.html'">+ Room</button>

      <button id="avatarBtn" class="avatar-btn" type="button">
        <span>☾</span>
      </button>
    </div>

    <div id="avatarMenu" class="avatar-menu hidden">
      <button onclick="window.location.href='profile.html'">
        <span>☺</span>
        Profile
      </button>

      <button onclick="window.location.href='room.html'">
        <span>＋</span>
        New room
      </button>

      <button onclick="window.location.href='home.html'">
        <span>↩</span>
        Return home
      </button>

      <button onclick="window.location.href='journal.html'">
        <span>☰</span>
        Journal
      </button>

      <button onclick="window.location.href='about.html'">
        <span>↗</span>
        About
      </button>

      <hr />

      <button id="signOutBtn">
        <span>×</span>
        Sign out
      </button>
    </div>
  </header>

  <main class="home-page">
    <section class="profile-card">
      <div id="profileAvatar" class="profile-avatar">☾</div>

      <h1 id="profileName">Đang tải...</h1>
      <p id="profileEmail">...</p>

      <button id="editProfileBtn" class="submit-btn" type="button">
        Chỉnh sửa hồ sơ
      </button>

      <div class="profile-info">
        <div class="info-row">
          <small>Sinh nhật</small>
          <strong id="profileBirthday">...</strong>
        </div>

        <div class="info-row">
          <small>TikTok</small>
          <strong id="profileTiktok">Chưa thêm</strong>
        </div>

        <div class="info-row">
          <small>Biết đến FreshSpirit từ</small>
          <strong id="profileHeardFrom">Chưa thêm</strong>
        </div>
      </div>
    </section>

    <section id="editPanel" class="profile-edit-panel hidden">
      <h2>Thông tin cá nhân</h2>

      <form id="editForm" class="edit-form">
        <label>
          Tên hiển thị
          <input id="editDisplayName" type="text" placeholder="Tên của bạn" />
        </label>

        <label>
          Link ảnh đại diện
          <input id="editAvatarUrl" type="url" placeholder="https://..." />
        </label>

        <label>
          TikTok
          <input id="editTiktok" type="text" placeholder="@freshspirit..." />
        </label>

        <label>
          Bạn biết đến FreshSpirit từ đâu?
          <select id="editHeardFrom">
            <option value="">Chọn một nguồn</option>
            <option value="Bạn bè / truyền miệng">Bạn bè / truyền miệng</option>
            <option value="TikTok">TikTok</option>
            <option value="Instagram">Instagram</option>
            <option value="Facebook">Facebook</option>
            <option value="Threads">Threads</option>
            <option value="YouTube">YouTube</option>
            <option value="Khác">Khác</option>
          </select>
        </label>

        <label>
          Sinh nhật
          <div id="readonlyBirthday" class="readonly-box">
            Sinh nhật chỉ được cài lần đầu.
          </div>
        </label>

        <div class="two-btn-row">
          <button id="cancelEditBtn" class="white-btn" type="button">Huỷ</button>
          <button class="submit-btn" type="submit">Lưu</button>
        </div>

        <p id="profileMessage" class="auth-message"></p>
      </form>
    </section>
  </main>

  <nav class="bottom-nav">
    <button onclick="window.location.href='home.html'">
      <span>☾</span>
      home
    </button>

    <button onclick="window.location.href='home.html'">
      <span>▣</span>
      cards
    </button>

    <button onclick="window.location.href='room.html'">
      <span>✦</span>
      practice
    </button>

    <button onclick="window.location.href='shop.html'">
      <span>♙</span>
      book
    </button>

    <button id="bottomMoreBtn" class="active-bottom">
      <span>☰</span>
      more
    </button>
  </nav>

  <button class="help-btn">?</button>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>

  <script>
    let currentUser = null;
    let currentProfile = null;

    const profileAvatar = document.getElementById("profileAvatar");
    const profileName = document.getElementById("profileName");
    const profileEmail = document.getElementById("profileEmail");
    const profileBirthday = document.getElementById("profileBirthday");
    const profileTiktok = document.getElementById("profileTiktok");
    const profileHeardFrom = document.getElementById("profileHeardFrom");

    const editPanel = document.getElementById("editPanel");
    const editProfileBtn = document.getElementById("editProfileBtn");
    const cancelEditBtn = document.getElementById("cancelEditBtn");
    const editForm = document.getElementById("editForm");
    const profileMessage = document.getElementById("profileMessage");

    const editDisplayName = document.getElementById("editDisplayName");
    const editAvatarUrl = document.getElementById("editAvatarUrl");
    const editTiktok = document.getElementById("editTiktok");
    const editHeardFrom = document.getElementById("editHeardFrom");
    const readonlyBirthday = document.getElementById("readonlyBirthday");

    const heartBtn = document.getElementById("heartBtn");
    const avatarBtn = document.getElementById("avatarBtn");
    const avatarMenu = document.getElementById("avatarMenu");
    const bottomMoreBtn = document.getElementById("bottomMoreBtn");
    const signOutBtn = document.getElementById("signOutBtn");

    function birthdayText(profile) {
      if (!profile || !profile.birthday_month || !profile.birthday_day || !profile.birthday_year) {
        return "Chưa có sinh nhật";
      }

      return `${profile.birthday_day} / ${profile.birthday_month} / ${profile.birthday_year}`;
    }

    function renderProfile(profile) {
      profileName.textContent = profile.display_name || "Người dùng FreshSpirit";
      profileEmail.textContent = profile.email || currentUser.email || "";
      profileBirthday.textContent = birthdayText(profile);
      profileTiktok.textContent = profile.tiktok_handle || "Chưa thêm";
      profileHeardFrom.textContent = profile.heard_from || "Chưa thêm";

      if (profile.avatar_url) {
        profileAvatar.innerHTML = `<img src="${profile.avatar_url}" alt="Avatar">`;
      } else {
        profileAvatar.textContent = "☾";
      }

      editDisplayName.value = profile.display_name || "";
      editAvatarUrl.value = profile.avatar_url || "";
      editTiktok.value = profile.tiktok_handle || "";
      editHeardFrom.value = profile.heard_from || "";
      readonlyBirthday.textContent = birthdayText(profile);
    }

    async function loadProfile() {
      const { data: userData } = await db.auth.getUser();

      if (!userData.user) {
        window.location.href = "auth.html";
        return;
      }

      currentUser = userData.user;

      const { data: profile, error } = await db
        .from("profiles")
        .select("*")
        .eq("id", currentUser.id)
        .single();

      if (error) {
        profileName.textContent = "Không tải được hồ sơ";
        profileEmail.textContent = error.message;
        return;
      }

      currentProfile = profile;
      renderProfile(profile);
    }

    editProfileBtn.addEventListener("click", () => {
      editPanel.classList.remove("hidden");
      window.scrollTo({ top: editPanel.offsetTop - 100, behavior: "smooth" });
    });

    cancelEditBtn.addEventListener("click", () => {
      editPanel.classList.add("hidden");
      profileMessage.textContent = "";
    });

    editForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      profileMessage.textContent = "Đang lưu...";

      const updates = {
        display_name: editDisplayName.value.trim() || "Người dùng FreshSpirit",
        avatar_url: editAvatarUrl.value.trim(),
        tiktok_handle: editTiktok.value.trim(),
        heard_from: editHeardFrom.value,
        updated_at: new Date().toISOString()
      };

      const { error } = await db
        .from("profiles")
        .update(updates)
        .eq("id", currentUser.id);

      if (error) {
        profileMessage.textContent = error.message;
        return;
      }

      currentProfile = {
        ...currentProfile,
        ...updates
      };

      renderProfile(currentProfile);
      profileMessage.textContent = "Đã lưu thông tin.";
      setTimeout(() => {
        editPanel.classList.add("hidden");
      }, 700);
    });

    heartBtn.addEventListener("click", () => {
      heartBtn.classList.toggle("liked");
      heartBtn.textContent = heartBtn.classList.contains("liked") ? "♥" : "♡";
    });

    function toggleMenu() {
      avatarMenu.classList.toggle("hidden");
    }

    avatarBtn.addEventListener("click", toggleMenu);
    bottomMoreBtn.addEventListener("click", toggleMenu);

    signOutBtn.addEventListener("click", async () => {
      await db.auth.signOut();
      window.location.href = "auth.html";
    });

    document.addEventListener("click", (event) => {
      const clickedInsideMenu = avatarMenu.contains(event.target);
      const clickedAvatar = avatarBtn.contains(event.target);
      const clickedMore = bottomMoreBtn.contains(event.target);

      if (!clickedInsideMenu && !clickedAvatar && !clickedMore) {
        avatarMenu.classList.add("hidden");
      }
    });

    loadProfile();
  </script>
</body>
</html>
