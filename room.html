<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>FreshSpirit - Phòng bốc bài</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body class="app-body">
  <header class="mobile-header fixed-header">
    <div>
      <a href="home.html" class="app-logo">FreshSpirit</a>
      <p>A new place for tarot</p>
    </div>

    <div class="header-actions">
      <button class="icon-btn" onclick="window.location.href='shop.html'">♙</button>
      <button id="heartBtn" class="icon-btn">♡</button>
      <button class="black-btn" onclick="drawCard()">+ Room</button>

      <button id="avatarBtn" class="avatar-btn" type="button">
        <span>☾</span>
      </button>
    </div>

    <div id="avatarMenu" class="avatar-menu hidden">
      <button onclick="window.location.href='profile.html'">
        <span>☺</span>
        Profile
      </button>

      <button onclick="window.location.href='room.html'">
        <span>＋</span>
        New room
      </button>

      <button onclick="window.location.href='home.html'">
        <span>↩</span>
        Return home
      </button>

      <button onclick="window.location.href='journal.html'">
        <span>☰</span>
        Journal
      </button>

      <button onclick="window.location.href='about.html'">
        <span>↗</span>
        About
      </button>

      <hr />

      <button id="signOutBtn">
        <span>×</span>
        Sign out
      </button>
    </div>
  </header>

  <main class="home-page">
    <section class="room-card-screen">
      <p class="room-kicker">FreshSpirit Room</p>

      <h1>Rút một lá bài</h1>

      <p class="room-intro">
        Hãy giữ câu hỏi trong lòng, thở chậm lại và để bộ bài gửi đến bạn một thông điệp.
      </p>

      <div class="draw-area">
        <div id="cardBack" class="large-card-back">
          <span>✦</span>
          <small>FreshSpirit</small>
        </div>

        <div id="cardResult" class="draw-result hidden">
          <img id="drawnCardImage" src="" alt="Tarot card" />
          <h2 id="drawnCardTitle">Tên lá bài</h2>
          <p id="drawnCardMeaning">Ý nghĩa lá bài sẽ hiện ở đây.</p>
        </div>
      </div>

      <button onclick="drawCard()" class="submit-btn room-main-btn">
        Rút bài
      </button>

      <button id="saveJournalBtn" class="outline-wide-btn hidden" type="button">
        Lưu vào nhật ký
      </button>

      <p id="roomMessage" class="auth-message"></p>
    </section>
  </main>

  <nav class="bottom-nav">
    <button onclick="window.location.href='home.html'">
      <span>☾</span>
      home
    </button>

    <button onclick="window.location.href='home.html'">
      <span>▣</span>
      cards
    </button>

    <button class="active-bottom" onclick="window.location.href='room.html'">
      <span>✦</span>
      practice
    </button>

    <button onclick="window.location.href='shop.html'">
      <span>♙</span>
      book
    </button>

    <button id="bottomMoreBtn">
      <span>☰</span>
      more
    </button>
  </nav>

  <button class="help-btn">?</button>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="script.js"></script>

  <script>
    let currentUser = null;
    let currentCard = null;

    const heartBtn = document.getElementById("heartBtn");
    const avatarBtn = document.getElementById("avatarBtn");
    const avatarMenu = document.getElementById("avatarMenu");
    const bottomMoreBtn = document.getElementById("bottomMoreBtn");
    const signOutBtn = document.getElementById("signOutBtn");
    const saveJournalBtn = document.getElementById("saveJournalBtn");

    const cardBack = document.getElementById("cardBack");
    const cardResult = document.getElementById("cardResult");
    const drawnCardImage = document.getElementById("drawnCardImage");
    const drawnCardTitle = document.getElementById("drawnCardTitle");
    const drawnCardMeaning = document.getElementById("drawnCardMeaning");
    const roomMessage = document.getElementById("roomMessage");

    async function protectPage() {
      const { data } = await db.auth.getUser();

      if (!data.user) {
        window.location.href = "auth.html";
        return;
      }

      currentUser = data.user;
    }

    function drawCard() {
      if (typeof getRandomCard !== "function") {
        roomMessage.textContent = "Chưa tìm thấy database tarot trong script.js.";
        return;
      }

      currentCard = getRandomCard();

      drawnCardImage.src = currentCard.image;
      drawnCardImage.alt = currentCard.name;
      drawnCardTitle.textContent = `${currentCard.name} — ${currentCard.viName}`;
      drawnCardMeaning.textContent = currentCard.meaning;

      cardBack.classList.add("hidden");
      cardResult.classList.remove("hidden");
      saveJournalBtn.classList.remove("hidden");

      roomMessage.textContent = "";
    }

    saveJournalBtn.addEventListener("click", async () => {
      if (!currentUser) {
        roomMessage.textContent = "Bạn cần đăng nhập để lưu trải bài.";
        return;
      }

      if (!currentCard) {
        roomMessage.textContent = "Bạn cần rút bài trước khi lưu.";
        return;
      }

      roomMessage.textContent = "Đang lưu vào nhật ký...";

      const { error } = await db.from("journal_entries").insert({
        user_id: currentUser.id,
        title: `Rút 1 lá: ${currentCard.name}`,
        spread_type: "one-card",
        question: "Rút bài ngẫu nhiên trong FreshSpirit Room",
        cards: [currentCard],
        interpretation: currentCard.meaning
      });

      if (error) {
        roomMessage.textContent = error.message;
        return;
      }

      roomMessage.textContent = "Đã lưu vào nhật ký.";
    });

    heartBtn.addEventListener("click", () => {
      heartBtn.classList.toggle("liked");

      if (heartBtn.classList.contains("liked")) {
        heartBtn.textContent = "♥";
      } else {
        heartBtn.textContent = "♡";
      }
    });

    function toggleMenu() {
      avatarMenu.classList.toggle("hidden");
    }

    avatarBtn.addEventListener("click", toggleMenu);
    bottomMoreBtn.addEventListener("click", toggleMenu);

    signOutBtn.addEventListener("click", async () => {
      await db.auth.signOut();
      window.location.href = "auth.html";
    });

    document.addEventListener("click", (event) => {
      const clickedInsideMenu = avatarMenu.contains(event.target);
      const clickedAvatar = avatarBtn.contains(event.target);
      const clickedMore = bottomMoreBtn.contains(event.target);

      if (!clickedInsideMenu && !clickedAvatar && !clickedMore) {
        avatarMenu.classList.add("hidden");
      }
    });

    protectPage();
  </script>
</body>
</html>
