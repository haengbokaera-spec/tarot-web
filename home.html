<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>FreshSpirit - Home</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body class="app-body">
  <header class="mobile-header fixed-header">
    <div>
      <a href="home.html" class="app-logo">FreshSpirit</a>
      <p>A new place for tarot</p>
    </div>

    <div class="header-actions">
      <button class="icon-btn" onclick="window.location.href='shop.html'">♙</button>
      <button id="heartBtn" class="icon-btn">♡</button>
      <button class="black-btn" onclick="window.location.href='room.html'">+ Room</button>

      <button id="avatarBtn" class="avatar-btn" type="button">
        <span>☾</span>
      </button>
    </div>

    <div id="avatarMenu" class="avatar-menu hidden">
      <button onclick="window.location.href='profile.html'">
        <span>☺</span>
        Profile
      </button>

      <button onclick="window.location.href='room.html'">
        <span>＋</span>
        New room
      </button>

      <button onclick="window.location.href='home.html'">
        <span>↩</span>
        Return home
      </button>

      <button onclick="window.location.href='journal.html'">
        <span>☰</span>
        Journal
      </button>

      <button onclick="window.location.href='about.html'">
        <span>↗</span>
        About
      </button>

      <hr />

      <button id="signOutBtn">
        <span>×</span>
        Sign out
      </button>
    </div>
  </header>

  <main class="home-page">
    <section class="home-hero-card">
      <div class="pill-tabs">
        <button class="active-pill" type="button">Guidebook</button>
        <button type="button" onclick="window.location.href='room.html'">Spreads</button>
      </div>

      <h1>Do tarot anywhere</h1>

      <p>
        Rút bài, lưu trải bài vào nhật ký và quay lại chiêm nghiệm bất cứ lúc nào.
      </p>

      <div class="hero-tarot-fan">
        <img src="images/cards/maj00.jpg" alt="The Fool" />
        <img src="images/cards/maj01.jpg" alt="The Magician" />
        <img src="images/cards/maj02.jpg" alt="The High Priestess" />
      </div>
    </section>

    <section class="home-section">
      <h2>Start your reading</h2>

      <div class="quick-grid">
        <button class="quick-card" onclick="window.location.href='room.html'">
          <span>✦</span>
          <strong>New room</strong>
          <small>Rút một lá bài ngẫu nhiên và lưu lại vào journal.</small>
        </button>

        <button class="quick-card" onclick="window.location.href='cards.html'">
          <span>▣</span>
          <strong>Explore cards</strong>
          <small>Xem đủ 78 lá Rider Waite và nghĩa ngắn gọn từng lá.</small>
        </button>

        <button class="quick-card" onclick="window.location.href='journal.html'">
          <span>☰</span>
          <strong>Your journal</strong>
          <small>Xem lại những trải bài đã lưu trước đó.</small>
        </button>

        <button class="quick-card" onclick="window.location.href='profile.html'">
          <span>☺</span>
          <strong>Your profile</strong>
          <small>Xem thông tin cá nhân và ngày sinh đã lưu.</small>
        </button>
      </div>
    </section>

    <section class="home-section bottom-space">
      <h2>Featured cards</h2>

      <p>
        Một vài lá bài nổi bật trong bộ Rider Waite.
      </p>

      <div class="featured-card-row">
        <img src="images/cards/maj19.jpg" alt="The Sun" />
        <img src="images/cards/maj07.jpg" alt="The Chariot" />
        <img src="images/cards/cups01.jpg" alt="Ace of Cups" />
        <img src="images/cards/wands04.jpg" alt="Four of Wands" />
      </div>
    </section>
  </main>

  <nav class="bottom-nav">
    <button class="active-bottom" onclick="window.location.href='home.html'">
      <span>☾</span>
      home
    </button>

    <button onclick="window.location.href='cards.html'">
      <span>▣</span>
      cards
    </button>

    <button onclick="window.location.href='room.html'">
      <span>✦</span>
      practice
    </button>

    <button onclick="window.location.href='shop.html'">
      <span>♙</span>
      book
    </button>

    <button id="bottomMoreBtn">
      <span>☰</span>
      more
    </button>
  </nav>

  <button class="help-btn">?</button>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>

  <script>
    const heartBtn = document.getElementById("heartBtn");
    const avatarBtn = document.getElementById("avatarBtn");
    const avatarMenu = document.getElementById("avatarMenu");
    const bottomMoreBtn = document.getElementById("bottomMoreBtn");
    const signOutBtn = document.getElementById("signOutBtn");

    async function protectPage() {
      const { data } = await db.auth.getUser();

      if (!data.user) {
        window.location.href = "auth.html";
        return;
      }
    }

    heartBtn.addEventListener("click", () => {
      heartBtn.classList.toggle("liked");

      if (heartBtn.classList.contains("liked")) {
        heartBtn.textContent = "♥";
      } else {
        heartBtn.textContent = "♡";
      }
    });

    function toggleMenu() {
      avatarMenu.classList.toggle("hidden");
    }

    avatarBtn.addEventListener("click", toggleMenu);
    bottomMoreBtn.addEventListener("click", toggleMenu);

    signOutBtn.addEventListener("click", async () => {
      await db.auth.signOut();
      window.location.href = "auth.html";
    });

    document.addEventListener("click", (event) => {
      const clickedInsideMenu = avatarMenu.contains(event.target);
      const clickedAvatar = avatarBtn.contains(event.target);
      const clickedMore = bottomMoreBtn.contains(event.target);

      if (!clickedInsideMenu && !clickedAvatar && !clickedMore) {
        avatarMenu.classList.add("hidden");
      }
    });

    protectPage();
  </script>
</body>
</html>
