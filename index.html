<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>FreshSpirit</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      color: #000;
      font-family: Arial, Helvetica, sans-serif;
    }

    button,
    input,
    select,
    textarea {
      font-family: inherit;
    }

    button {
      cursor: pointer;
    }

    .hidden {
      display: none !important;
    }

    .app {
      width: min(100%, 390px);
      min-height: 100vh;
      margin: 0 auto;
      background: #f4f4f4;
      padding-bottom: 92px;
    }

    .topbar {
      width: min(100%, 390px);
      height: 88px;
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      background: #f4f4f4;
      border-bottom: 2px solid #111;
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .logo {
      font-size: 23px;
      font-weight: 900;
      letter-spacing: -1px;
      line-height: 1;
    }

    .tagline {
      font-size: 13px;
      font-weight: 700;
      margin-top: 4px;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .icon-btn,
    .black-btn,
    .avatar-btn {
      height: 38px;
      border: 2px solid #111;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 900;
      background: #fff;
      color: #000;
    }

    .icon-btn {
      width: 38px;
      font-size: 18px;
    }

    .black-btn {
      padding: 0 10px;
      background: #000;
      color: #fff;
    }

    .avatar-btn {
      width: 38px;
      border-radius: 999px;
      font-size: 18px;
    }

    .liked {
      background: #000 !important;
      color: #fff !important;
    }

    .menu {
      position: fixed;
      top: 96px;
      right: calc((100vw - min(100vw, 390px)) / 2 + 12px);
      width: 210px;
      background: #fff;
      border: 2px solid #111;
      border-radius: 22px;
      box-shadow: 0 6px 0 #000;
      padding: 10px;
      z-index: 80;
    }

    .menu button {
      width: 100%;
      min-height: 42px;
      border: none;
      background: transparent;
      text-align: left;
      font-size: 15px;
      font-weight: 900;
      padding: 8px 10px;
      border-radius: 14px;
    }

    .menu button:hover {
      background: #eee;
    }

    .menu hr {
      border: none;
      border-top: 2px solid #111;
      margin: 8px 0;
    }

    .page {
      padding: 108px 14px 20px;
    }

    .card {
      background: #fff;
      border: 2px solid #111;
      border-radius: 32px;
      box-shadow: 0 5px 0 #000;
      padding: 22px;
      margin-bottom: 18px;
    }

    .card h1 {
      font-size: 32px;
      line-height: 1;
      margin-bottom: 12px;
      letter-spacing: -1px;
    }

    .card h2 {
      font-size: 23px;
      line-height: 1.1;
      margin-bottom: 10px;
    }

    .card p {
      font-size: 15px;
      line-height: 1.45;
      color: #333;
      font-weight: 650;
      margin-bottom: 14px;
    }

    .auth-page {
      min-height: 100vh;
      width: min(100%, 390px);
      margin: 0 auto;
      background: #f4f4f4;
      padding: 26px 14px;
      display: grid;
      place-items: center;
    }

    .auth-card {
      width: 100%;
      background: #fff;
      border: 2px solid #111;
      border-radius: 38px;
      box-shadow: 0 5px 0 #000;
      padding: 26px 18px;
      text-align: center;
    }

    .auth-card h1 {
      font-size: 26px;
      margin-bottom: 18px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
    }

    .tabs button {
      flex: 1;
      height: 44px;
      border: 2px solid #111;
      border-radius: 16px;
      background: #fff;
      font-weight: 900;
    }

    .tabs .active {
      background: #000;
      color: #fff;
    }

    .form {
      display: grid;
      gap: 11px;
    }

    .form input,
    .form select,
    .form textarea {
      width: 100%;
      border: 2px solid #c8c8c8;
      border-radius: 20px;
      padding: 0 16px;
      font-size: 16px;
      font-weight: 800;
      outline: none;
      background: #fff;
    }

    .form input,
    .form select {
      height: 54px;
    }

    .form textarea {
      min-height: 150px;
      padding: 14px 16px;
      resize: vertical;
      line-height: 1.45;
    }

    .submit {
      width: 100%;
      min-height: 58px;
      border: 2px solid #111;
      border-radius: 21px;
      background: #000;
      color: #fff;
      font-size: 18px;
      font-weight: 900;
      margin-top: 8px;
      padding: 12px;
    }

    .white-btn {
      width: 100%;
      min-height: 52px;
      border: 2px solid #111;
      border-radius: 20px;
      background: #fff;
      color: #000;
      font-size: 16px;
      font-weight: 900;
      box-shadow: 0 4px 0 #000;
      padding: 10px;
    }

    .mini-btn {
      width: 100%;
      min-height: 38px;
      border: 2px solid #111;
      border-radius: 14px;
      background: #000;
      color: #fff;
      font-size: 13px;
      font-weight: 900;
      padding: 8px;
    }

    .message {
      min-height: 22px;
      margin-top: 14px;
      font-size: 14px;
      font-weight: 800;
      line-height: 1.4;
    }

    .birthday-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin: 14px 0;
    }

    .checkbox-list {
      display: grid;
      gap: 10px;
      margin: 14px 0;
      text-align: left;
    }

    .checkbox-list label {
      display: flex;
      gap: 10px;
      align-items: center;
      font-weight: 800;
      font-size: 14px;
      line-height: 1.35;
    }

    .checkbox-list input {
      width: 26px;
      height: 26px;
      accent-color: #000;
    }

    .quick-grid {
      display: grid;
      gap: 12px;
    }

    .quick-card {
      min-height: 96px;
      border: 2px solid #111;
      border-radius: 22px;
      background: #f7f7f7;
      box-shadow: 0 4px 0 #000;
      padding: 16px;
      text-align: left;
      display: grid;
      grid-template-columns: 42px 1fr;
      gap: 4px 12px;
    }

    .quick-card span {
      width: 40px;
      height: 40px;
      border: 2px solid #111;
      border-radius: 999px;
      background: #000;
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 20px;
      grid-row: span 2;
    }

    .quick-card strong {
      font-size: 17px;
    }

    .quick-card small {
      color: #555;
      font-size: 13px;
      line-height: 1.35;
      font-weight: 700;
    }

    .fan {
      position: relative;
      height: 190px;
      margin-top: 20px;
    }

    .fan img {
      position: absolute;
      top: 0;
      left: 50%;
      width: 112px;
      height: 176px;
      object-fit: cover;
      border: 6px solid #111;
      border-radius: 12px;
      box-shadow: 0 5px 0 #000;
    }

    .fan img:nth-child(1) {
      transform: translateX(-120px) rotate(-12deg);
    }

    .fan img:nth-child(2) {
      transform: translateX(-56px) translateY(-10px);
      z-index: 2;
    }

    .fan img:nth-child(3) {
      transform: translateX(10px) rotate(12deg);
    }

    .featured {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 14px;
    }

    .featured img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border: 4px solid #111;
      border-radius: 10px;
      box-shadow: 0 3px 0 #000;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .tarot-item {
      background: #fff;
      border: 2px solid #111;
      border-radius: 22px;
      box-shadow: 0 4px 0 #000;
      padding: 12px;
      text-align: center;
    }

    .tarot-item img {
      width: 100%;
      height: 205px;
      object-fit: cover;
      border: 4px solid #111;
      border-radius: 12px;
      margin-bottom: 10px;
      background: #fff;
    }

    .tarot-item h2 {
      font-size: 16px;
      margin-bottom: 4px;
    }

    .tarot-item small {
      display: block;
      font-size: 12px;
      font-weight: 800;
      color: #555;
      margin-bottom: 8px;
      line-height: 1.35;
    }

    .tarot-item p {
      text-align: left;
      font-size: 13px;
      line-height: 1.4;
      color: #333;
      font-weight: 650;
      margin-top: 8px;
    }

    .tarot-item.meaning-closed p {
      display: none;
    }

    .spread-grid {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .spread-btn {
      width: 100%;
      border: 2px solid #111;
      border-radius: 20px;
      background: #fff;
      box-shadow: 0 4px 0 #000;
      padding: 14px;
      text-align: left;
      font-weight: 900;
    }

    .spread-btn.active {
      background: #000;
      color: #fff;
    }

    .spread-btn small {
      display: block;
      margin-top: 5px;
      font-size: 12px;
      line-height: 1.35;
      font-weight: 700;
      opacity: 0.8;
    }

    .practice-case {
      border: 2px solid #111;
      border-radius: 24px;
      background: #f7f7f7;
      padding: 16px;
      margin-top: 14px;
    }

    .practice-case strong {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
    }

    .journal-entry {
      background: #fff;
      border: 2px solid #111;
      border-radius: 28px;
      box-shadow: 0 5px 0 #000;
      padding: 18px;
      margin-bottom: 16px;
    }

    .date-pill {
      display: inline-block;
      padding: 7px 10px;
      border: 2px solid #111;
      border-radius: 999px;
      background: #f4f4f4;
      font-size: 12px;
      font-weight: 900;
      margin-bottom: 10px;
    }

    .journal-card-row {
      display: grid;
      grid-template-columns: 80px 1fr;
      gap: 12px;
      align-items: start;
      margin-top: 12px;
      padding: 12px;
      border: 2px solid #111;
      border-radius: 18px;
      background: #f7f7f7;
    }

    .journal-card-row img {
      width: 80px;
      border: 4px solid #111;
      border-radius: 10px;
      background: #fff;
    }

    .journal-card-row strong {
      display: block;
      font-size: 14px;
      line-height: 1.35;
      margin-bottom: 6px;
    }

    .journal-card-row p {
      font-size: 13px;
      line-height: 1.4;
      margin-bottom: 0;
    }

    .profile-avatar {
      width: 112px;
      height: 112px;
      border: 2px solid #111;
      border-radius: 999px;
      margin: 0 auto 16px;
      background: #f4f4f4;
      overflow: hidden;
      display: grid;
      place-items: center;
      font-size: 46px;
      font-weight: 900;
    }

    .profile-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .info-row {
      border: 2px solid #111;
      border-radius: 18px;
      padding: 12px 14px;
      background: #f7f7f7;
      margin-top: 10px;
      text-align: left;
    }

    .info-row small {
      display: block;
      color: #777;
      font-size: 12px;
      font-weight: 900;
      margin-bottom: 4px;
    }

    .info-row strong {
      white-space: pre-wrap;
      font-size: 14px;
      line-height: 1.45;
    }

    .social-btn {
      width: 100%;
      min-height: 58px;
      border: 2px solid #111;
      border-radius: 20px;
      background: #fff;
      color: #000;
      text-decoration: none;
      box-shadow: 0 4px 0 #000;
      display: grid;
      grid-template-columns: 42px 1fr 24px;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      text-align: left;
      font-weight: 900;
      margin-bottom: 12px;
    }

    .social-btn span:first-child {
      width: 38px;
      height: 38px;
      border: 2px solid #111;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: #000;
      color: #fff;
    }

    .bottom-nav {
      width: min(100%, 390px);
      height: 74px;
      position: fixed;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      background: #fff;
      border-top: 2px solid #111;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      z-index: 60;
    }

    .bottom-nav button {
      border: none;
      background: #fff;
      color: #111;
      font-size: 11px;
      font-weight: 900;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
    }

    .bottom-nav span {
      font-size: 21px;
    }

    .bottom-nav .active {
      background: #000;
      color: #fff;
    }

    @media (max-width: 360px) {
      .cards-grid {
        grid-template-columns: 1fr;
      }

      .tarot-item img {
        height: auto;
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="script.js"></script>

  <script>
    let currentUser = null;
    let currentProfile = null;
    let authMode = "login";
    let currentView = "home";

    let practiceCase = null;
    let practiceSpread = null;
    let practiceCards = [];
    let freshSpiritTakeText = "";

    const root = document.getElementById("root");

    const PRACTICE_CASES = [
      {
        name: "Minh Anh",
        age: 22,
        topic: "Tình cảm",
        question: "Người cũ có còn tình cảm với mình không?",
        story: "Minh Anh vừa kết thúc một mối quan hệ kéo dài gần 2 năm. Hai người vẫn thỉnh thoảng xem story của nhau nhưng không ai chủ động nhắn tin. Querent muốn biết liệu người cũ còn cảm xúc thật không, hay chỉ là thói quen."
      },
      {
        name: "Hoài",
        age: 25,
        topic: "Công việc",
        question: "Mình có nên nghỉ việc hiện tại không?",
        story: "Hoài đang làm ở một công ty ổn định nhưng cảm thấy bị bào mòn năng lượng. Sếp không quá tệ, lương tạm ổn, nhưng cô ấy thấy mình không phát triển thêm. Cô ấy đang cân nhắc nghỉ để học thêm kỹ năng mới."
      },
      {
        name: "Gia Hân",
        age: 19,
        topic: "Học tập",
        question: "Mình có chọn đúng ngành không?",
        story: "Gia Hân vừa vào đại học nhưng cảm thấy ngành học không giống kỳ vọng. Bạn ấy không chắc đây là áp lực giai đoạn đầu hay thật sự đã chọn sai hướng."
      },
      {
        name: "Tuấn",
        age: 27,
        topic: "Tình cảm",
        question: "Người mình đang tìm hiểu có nghiêm túc không?",
        story: "Tuấn đang nói chuyện với một người rất hợp vibe. Cả hai nhắn tin đều nhưng đối phương ít nói rõ cảm xúc. Tuấn muốn biết mối quan hệ này có tiềm năng đi xa không."
      },
      {
        name: "Linh Chi",
        age: 24,
        topic: "Gia đình",
        question: "Mình nên làm gì để bớt căng thẳng với mẹ?",
        story: "Linh Chi thường xuyên cãi nhau với mẹ vì chuyện học, tiền bạc và tương lai. Hai mẹ con đều thương nhau nhưng cách nói chuyện dễ làm tổn thương nhau."
      },
      {
        name: "Bảo Ngọc",
        age: 21,
        topic: "Bản thân",
        question: "Điều gì đang cản mình tự tin hơn?",
        story: "Bảo Ngọc hay so sánh bản thân với người khác. Bạn ấy có năng lực nhưng mỗi lần định bắt đầu điều gì mới lại sợ bị đánh giá."
      },
      {
        name: "Khánh Vy",
        age: 26,
        topic: "Công việc",
        question: "Dự án riêng của mình có tiềm năng không?",
        story: "Khánh Vy muốn mở một dịch vụ nhỏ online nhưng sợ không có khách. Bạn ấy đã có ý tưởng, có kỹ năng, nhưng thiếu tự tin và chưa biết bắt đầu từ đâu."
      },
      {
        name: "An",
        age: 20,
        topic: "Tình cảm",
        question: "Crush nghĩ gì về mình?",
        story: "An và crush học chung lớp. Hai người có vài lần nói chuyện riêng khá vui, nhưng crush lúc gần lúc xa. An muốn hiểu cảm nhận thật của đối phương."
      },
      {
        name: "Mai Phương",
        age: 29,
        topic: "Tài chính",
        question: "Mình nên tiết kiệm hay đầu tư trong giai đoạn này?",
        story: "Mai Phương có một khoản tiền nhỏ sau vài năm đi làm. Cô ấy muốn dùng tiền thông minh hơn nhưng sợ rủi ro và thiếu kiến thức tài chính."
      },
      {
        name: "Quỳnh",
        age: 23,
        topic: "Định hướng",
        question: "Hướng đi nào phù hợp với mình trong 6 tháng tới?",
        story: "Quỳnh cảm thấy mình đang đứng giữa nhiều lựa chọn: học thêm, đổi việc, xây thương hiệu cá nhân hoặc nghỉ ngơi một thời gian."
      },
      {
        name: "Duy",
        age: 28,
        topic: "Tình cảm",
        question: "Mình có nên chủ động quay lại không?",
        story: "Duy chia tay trong lúc nóng giận. Sau vài tháng, bạn ấy thấy bản thân vẫn còn thương nhưng sợ quay lại sẽ lặp lại vấn đề cũ."
      },
      {
        name: "Nhi",
        age: 18,
        topic: "Thi cử",
        question: "Mình nên tập trung vào điều gì để thi tốt hơn?",
        story: "Nhi đang ôn thi nhưng dễ mất động lực. Bạn ấy học nhiều nhưng vẫn thấy hoang mang, không biết mình đang yếu thật sự ở đâu."
      }
    ];

    const PRACTICE_SPREADS = [
      {
        id: "one-card",
        name: "1 lá — Thông điệp chính",
        description: "Dùng khi querent cần một lời nhắn nhanh, rõ trọng tâm.",
        positions: ["Thông điệp chính"]
      },
      {
        id: "three-time",
        name: "3 lá — Quá khứ / Hiện tại / Tương lai",
        description: "Dùng để nhìn dòng chảy của một tình huống.",
        positions: ["Quá khứ", "Hiện tại", "Tương lai"]
      },
      {
        id: "three-advice",
        name: "3 lá — Vấn đề / Lời khuyên / Kết quả",
        description: "Dùng khi querent cần biết nên hành động thế nào.",
        positions: ["Vấn đề cốt lõi", "Lời khuyên", "Kết quả tiềm năng"]
      },
      {
        id: "love-five",
        name: "5 lá — Tình cảm",
        description: "Dùng cho câu hỏi tình yêu, crush, người cũ hoặc mối quan hệ mập mờ.",
        positions: [
          "Cảm xúc của querent",
          "Cảm xúc của đối phương",
          "Điều đang kết nối hai người",
          "Trở ngại chính",
          "Hướng phát triển"
        ]
      },
      {
        id: "career-five",
        name: "5 lá — Công việc / học tập",
        description: "Dùng cho định hướng nghề nghiệp, học tập, dự án cá nhân.",
        positions: [
          "Tình hình hiện tại",
          "Điểm mạnh của querent",
          "Điểm đang cản trở",
          "Cơ hội nên chú ý",
          "Bước hành động gần nhất"
        ]
      },
      {
        id: "choice-six",
        name: "6 lá — Lựa chọn A / B",
        description: "Dùng khi querent đang phân vân giữa hai hướng.",
        positions: [

    function esc(text) {
      return String(text || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function hasBirthday(profile) {
      return profile &&
        profile.birthday_month &&
        profile.birthday_day &&
        profile.birthday_year;
    }

    function birthdayText(profile) {
      if (!hasBirthday(profile)) return "Chưa có sinh nhật";
      return `${profile.birthday_day} / ${profile.birthday_month} / ${profile.birthday_year}`;
    }

    function getHashView() {
      return location.hash.replace("#", "") || "home";
    }

    function pickRandom(array) {
      return array[Math.floor(Math.random() * array.length)];
    }

    function shuffledDeck() {
      if (typeof getAllCards !== "function") return [];

      const deck = [...getAllCards()];

      for (let i = deck.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const temp = deck[i];
        deck[i] = deck[j];
        deck[j] = temp;
      }

      return deck;
    }

    function reversedMeaning(card) {
      return `Nghĩa ngược: năng lượng của ${card.viName || card.name} đang bị chặn, lệch hướng hoặc chưa được dùng đúng cách. Khi đọc ngược, hãy xem đây là dấu hiệu của sự trì hoãn, mất cân bằng, né tránh hoặc bài học mà querent chưa thật sự tiếp nhận. Nghĩa xuôi gốc: ${card.meaning}`;
    }

    function cardMeaning(card) {
      if (card.isReversed) return reversedMeaning(card);
      return card.meaning;
    }

    function normalizeCards(cards) {
      if (!cards) return [];
      if (Array.isArray(cards)) return cards;

      try {
        return JSON.parse(cards);
      } catch {
        return [];
      }
    }

    function go(view) {
      location.hash = view;
      currentView = view;
      render();
    }

    async function loadProfile() {
      if (!currentUser) return null;

      const { data, error } = await db
        .from("profiles")
        .select("*")
        .eq("id", currentUser.id)
        .maybeSingle();

      if (!data && !error) {
        await db.from("profiles").upsert({
          id: currentUser.id,
          email: currentUser.email,
          display_name: "Người dùng FreshSpirit",
          updated_at: new Date().toISOString()
        });
      }

      currentProfile = data || {
        id: currentUser.id,
        email: currentUser.email,
        display_name: "Người dùng FreshSpirit"
      };

      return currentProfile;
    }

      const { data } = await db.auth.getUser();
      currentUser = data.user || null;

      if (currentUser) {
        await loadProfile();
      }

      currentView = getHashView();

      if (!currentUser) {
        currentView = "auth";
      } else if (!hasBirthday(currentProfile)) {
        currentView = "onboarding";
      }

      render();
    }

    async function handleAuth(event) {
      event.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const authMessage = document.getElementById("authMessage");

      if (password.length < 6) {
        authMessage.textContent = "Mật khẩu phải có ít nhất 6 ký tự.";
        return;
      }

      if (authMode === "login") {
        authMessage.textContent = "Đang đăng nhập...";

        const { data, error } = await db.auth.signInWithPassword({
          email,
          password
        });

        if (error) {
          authMessage.textContent = error.message;
          return;
        }

        currentUser = data.user;
        await loadProfile();

        currentView = hasBirthday(currentProfile) ? "home" : "onboarding";
        location.hash = currentView;
        render();
        return;
      }

      const displayName = document.getElementById("displayName").value.trim() || "Người dùng FreshSpirit";

      authMessage.textContent = "Đang tạo tài khoản...";

      const { data, error } = await db.auth.signUp({
        email,
        password,
        options: {
          data: {
            display_name: displayName
          }
        }
      });

      if (error) {
        authMessage.textContent = error.message;
        return;
      }

      if (!data.session) {
        authMessage.textContent = "Tài khoản đã tạo nhưng chưa đăng nhập được. Kiểm tra Supabase đã tắt Confirm email chưa.";
        return;
      }

      currentUser = data.user;

      await db.from("profiles").upsert({
        id: currentUser.id,
        email: currentUser.email,
        display_name: displayName,
        updated_at: new Date().toISOString()
      });

      await loadProfile();

      currentView = "onboarding";
      location.hash = "onboarding";
      render();
    }

    async function saveOnboarding(event) {
      event.preventDefault();

      const message = document.getElementById("onboardingMessage");
      message.textContent = "Đang lưu...";

      const reasons = [...document.querySelectorAll(".checkbox-list input:checked")]
        .map(item => item.value);

      const profileUpdate = {
        birthday_month: Number(document.getElementById("birthMonth").value),
        birthday_day: Number(document.getElementById("birthDay").value),
        birthday_year: Number(document.getElementById("birthYear").value),
        heard_from: document.getElementById("heardFrom").value,
        tiktok_handle: document.getElementById("tiktokHandle").value.trim(),
        updated_at: new Date().toISOString()
      };

      const { error } = await db
        .from("profiles")
        .update(profileUpdate)
        .eq("id", currentUser.id);

      if (error) {
        message.textContent = error.message;
        return;
      }

      if (reasons.length > 0) {
        await db.from("onboarding_answers").insert(
          reasons.map(reason => ({
            user_id: currentUser.id,
            answer: reason
          }))
        );
      }

      await loadProfile();

      currentView = "home";
      location.hash = "home";
      render();
    }

          card.meaning.toLowerCase().includes(keyword)
        );

        renderCardGrid(filtered);
      });

    function renderCardGrid(cards) {
      const grid = document.getElementById("cardsGrid");

      if (!grid) return;

      if (!cards.length) {
        grid.innerHTML = `<section class="card"><p>Không tìm thấy lá bài phù hợp.</p></section>`;

      grid.innerHTML = cards.map((card, index) => `

          <img src="${esc(card.image)}" alt="${esc(card.name)}">
          <h2>${esc(card.name)}</h2>

          <button class="mini-btn" onclick="toggleMeaning(${index})">Xem nghĩa</button>
          <p>${esc(card.meaning)}</p>
        </article>
      `).join("");
    }

    window.drawPracticeSpread = function() {
      const deck = shuffledDeck();

        if (message) {

        const baseCard = deck[index];

        return {
          ...baseCard,
          position,
          isReversed: Math.random() < 0.25
        };
      });

      freshSpiritTakeText = "";
      renderRoom();

    function buildFreshSpiritTake() {
      const cardLines = practiceCards.map(card => {
        return `${card.position}: ${card.name} ${card.isReversed ? "ngược" : "xuôi"} — ${cardMeaning(card)}`;
      });

      const mainTone = practiceCards.some(card => card.isReversed)
        ? "Trải bài này có năng lượng chưa hoàn toàn thông suốt. Một vài lá ngược cho thấy querent đang bị kẹt ở cảm xúc, niềm tin hoặc cách phản ứng cũ."
        : "Trải bài này có năng lượng khá rõ. Các lá bài đang kể một câu chuyện liền mạch về tình huống hiện tại và hướng đi tiếp theo.";

      return `
${mainTone}

Với case của ${practiceCase.name}, câu hỏi trọng tâm là: "${practiceCase.question}".

Khi đọc cho querent, nên bắt đầu bằng việc phản ánh đúng trạng thái của họ, sau đó mới đưa lời khuyên.

${cardLines.join(" ")}

Tổng kết: đừng đọc từng lá rời rạc. Hãy nối các vị trí lại: tình huống hiện tại đang chỉ ra điều gì, trở ngại nằm ở đâu, và querent nên làm gì trước mắt. Câu trả lời tốt nhất nên vừa có sự đồng cảm, vừa có một bước hành động cụ thể.
      `.trim();
    }

    function freshSpiritTakeHtml() {
      return `
        <section class="card">
          <h2>Góc nhìn FreshSpirit</h2>
          <p style="white-space:pre-wrap;">${esc(freshSpiritTakeText)}</p>
        </section>
      `;
    }

    window.getFreshSpiritTake = function() {
      if (!practiceCards.length) return;

      freshSpiritTakeText = buildFreshSpiritTake();

      const takeBox = document.getElementById("freshSpiritTakeBox");

      if (takeBox) {
        takeBox.innerHTML = freshSpiritTakeHtml();
      }
    };

    window.savePracticeJournal = async function() {
      const message = document.getElementById("roomMessage");

      if (!practiceCards.length) {
        message.textContent = "Bạn cần rút bài trước.";
        return;
      }

      const readerTitleInput = document.getElementById("readerTitle");
      const readerNotesInput = document.getElementById("readerNotes");

      const readerTitle = readerTitleInput ? readerTitleInput.value.trim() : "";
      const readerNotes = readerNotesInput ? readerNotesInput.value.trim() : "";

      const finalInterpretation = [
        readerNotes ? `Diễn giải của reader:\n${readerNotes}` : "",
        freshSpiritTakeText ? `Góc nhìn FreshSpirit:\n${freshSpiritTakeText}` : ""
      ].filter(Boolean).join("\n\n");

      message.textContent = "Đang lưu vào journal...";

      const { error } = await db.from("journal_entries").insert({
        user_id: currentUser.id,
        title: readerTitle || `${practiceSpread.name} — ${practiceCase.name}`,
        spread_type: practiceSpread.id,
        question: `${practiceCase.name}, ${practiceCase.age} tuổi · ${practiceCase.topic}: ${practiceCase.question}`,
        cards: practiceCards,
        interpretation: finalInterpretation || "Chưa có diễn giải."
      });

      if (error) {
        message.textContent = error.message;
        return;
      }

      message.textContent = "Đã lưu vào journal.";
    };

    function renderJournal() {
      root.innerHTML = layout(`
        <section class="card">
          <h1>Your journal</h1>
          <p>Đây là nơi lưu lại những case thực hành, trải bài và phần diễn giải của bạn.</p>
        </section>

        <section id="journalList">
          <p class="message">Đang tải journal...</p>
        </section>
      `, "more");

      loadJournal();
    }

    async function loadJournal() {
      const journalList = document.getElementById("journalList");

      const { data, error } = await db
        .from("journal_entries")
        .select("*")
        .eq("user_id", currentUser.id)
        .order("created_at", { ascending: false });

      if (error) {
        journalList.innerHTML = `<section class="card"><p>${esc(error.message)}</p></section>`;
        return;
      }

      if (!data || data.length === 0) {
        journalList.innerHTML = `
          <section class="card">
            <h2>Chưa có trải bài nào</h2>
            <p>Hãy vào Practice, tìm một querent ảo, rút bài và lưu lại phần diễn giải.</p>
            <button class="submit" onclick="go('room')">Đi practice</button>
          </section>
        `;
        return;
      }

      journalList.innerHTML = data.map((entry, entryIndex) => {
        const cards = normalizeCards(entry.cards);

        return `
          <article class="journal-entry">
            <span class="date-pill">${new Date(entry.created_at).toLocaleDateString("vi-VN")}</span>

            <h2>${esc(entry.title || "Trải bài đã lưu")}</h2>
            <p>${esc(entry.question || "Không có câu hỏi cụ thể.")}</p>

            <button class="white-btn" onclick="toggleJournalDetail(${entryIndex})">
              Đọc thêm
            </button>

            <div id="journalDetail${entryIndex}" class="hidden" style="margin-top:12px;">
              ${cards.map(card => `
                <div class="journal-card-row">
                  <img
                    src="${esc(card.image)}"
                    alt="${esc(card.name)}"
                    style="${card.isReversed ? "transform: rotate(180deg);" : ""}"
                  >

                  <div>
                    <strong>
                      ${esc(card.position || "Lá bài")} — ${esc(card.name)} / ${esc(card.viName)}
                      ${card.isReversed ? " · Ngược" : " · Xuôi"}
                    </strong>

                    <p>${esc(card.isReversed ? reversedMeaning(card) : card.meaning)}</p>
                  </div>
                </div>
              `).join("")}

              <div class="info-row">
                <small>Diễn giải đã lưu</small>
                <strong>${esc(entry.interpretation || "Chưa có diễn giải.")}</strong>
              </div>
            </div>
          </article>
        `;
      }).join("");
    }

    window.toggleJournalDetail = function(index) {
      const box = document.getElementById(`journalDetail${index}`);
      if (box) box.classList.toggle("hidden");
    };

    function renderProfile() {
      root.innerHTML = layout(`
        <section class="card" style="text-align:center;">
          <div class="profile-avatar">
            ${
              currentProfile.avatar_url
                ? `<img src="${esc(currentProfile.avatar_url)}" alt="Avatar">`
                : "☾"
            }
          </div>

          <h1>${esc(currentProfile.display_name || "Người dùng FreshSpirit")}</h1>
          <p>${esc(currentProfile.email || currentUser.email)}</p>

          <div class="info-row">
            <small>Sinh nhật</small>
            <strong>${birthdayText(currentProfile)}</strong>
          </div>

          <div class="info-row">
            <small>TikTok</small>
            <strong>${esc(currentProfile.tiktok_handle || "Chưa thêm")}</strong>
          </div>

          <div class="info-row">
            <small>Biết đến FreshSpirit từ</small>
            <strong>${esc(currentProfile.heard_from || "Chưa thêm")}</strong>
          </div>
        </section>

        <section class="card">
          <h2>Chỉnh sửa hồ sơ</h2>

          <form id="profileForm" class="form">
            <input id="profileName" type="text" placeholder="Tên hiển thị" value="${esc(currentProfile.display_name || "")}">
            <input id="profileAvatar" type="url" placeholder="Link ảnh đại diện" value="${esc(currentProfile.avatar_url || "")}">
            <input id="profileTiktok" type="text" placeholder="TikTok" value="${esc(currentProfile.tiktok_handle || "")}">

            <select id="profileHeardFrom">
              <option value="">Bạn biết FreshSpirit từ đâu?</option>
              <option value="Bạn bè / truyền miệng">Bạn bè / truyền miệng</option>
              <option value="TikTok">TikTok</option>
              <option value="Instagram">Instagram</option>
              <option value="Facebook">Facebook</option>
              <option value="Threads">Threads</option>
              <option value="YouTube">YouTube</option>
              <option value="Khác">Khác</option>
            </select>

            <button class="submit" type="submit">Lưu hồ sơ</button>
          </form>

          <p id="profileMessage" class="message"></p>
        </section>
      `, "more");

      document.getElementById("profileHeardFrom").value = currentProfile.heard_from || "";
      document.getElementById("profileForm").addEventListener("submit", saveProfile);
    }

    async function saveProfile(event) {
      event.preventDefault();

      const message = document.getElementById("profileMessage");
      message.textContent = "Đang lưu...";

      const updates = {
        display_name: document.getElementById("profileName").value.trim() || "Người dùng FreshSpirit",
        avatar_url: document.getElementById("profileAvatar").value.trim(),
        tiktok_handle: document.getElementById("profileTiktok").value.trim(),
        heard_from: document.getElementById("profileHeardFrom").value,
        updated_at: new Date().toISOString()
      };

      const { error } = await db
        .from("profiles")
        .update(updates)
        .eq("id", currentUser.id);

      if (error) {
        message.textContent = error.message;
        return;
      }

      await loadProfile();
      renderProfile();
    }

    function renderAbout() {
      root.innerHTML = layout(`
        <section class="card">
          <h1>About FreshSpirit</h1>
          <p>FreshSpirit là không gian dành cho tarot, trực giác và những cuộc trò chuyện sâu sắc.</p>

          <a class="social-btn" href="https://www.threads.com/@freshspirit.tarot" target="_blank">
            <span>𐙚</span><strong>Threads<br><small>@freshspirit.tarot</small></strong><span>↗</span>
          </a>

          <a class="social-btn" href="https://www.instagram.com/freshspirit.tarot" target="_blank">
            <span>◎</span><strong>Instagram<br><small>@freshspirit.tarot</small></strong><span>↗</span>
          </a>

          <a class="social-btn" href="https://www.facebook.com/share/1afMZGvmZE/?mibextid=wwXIfr" target="_blank">
            <span>f</span><strong>Facebook<br><small>FreshSpirit Tarot</small></strong><span>↗</span>
          </a>

          <a class="social-btn" href="https://www.tiktok.com/@freshspirit.tarot" target="_blank">
            <span>♪</span><strong>TikTok<br><small>@freshspirit.tarot</small></strong><span>↗</span>
          </a>

          <a class="social-btn" href="https://youtube.com/@freshspirittarot?si=ztlbn7sAeAv5lUz0" target="_blank">
            <span>▶</span><strong>YouTube<br><small>@freshspirittarot</small></strong><span>↗</span>
          </a>
        </section>
      `, "more");
    }

    function renderShop() {
      root.innerHTML = layout(`
        <section class="card">
          <h1>Cửa hàng FreshSpirit</h1>
          <p>Chọn dịch vụ tarot phù hợp. Phần thanh toán thật sẽ được kết nối sau.</p>

          <div class="quick-grid">
            <button class="quick-card" onclick="shopMessage('Trải bài nhanh')">
              <span>✦</span>
              <strong>Trải bài nhanh</strong>
              <small>49.000đ — Một câu hỏi trọng tâm.</small>
            </button>

            <button class="quick-card" onclick="shopMessage('Trải bài chuyên sâu')">
              <span>☾</span>
              <strong>Trải bài chuyên sâu</strong>
              <small>149.000đ — Tình cảm, công việc, định hướng.</small>
            </button>

            <button class="quick-card" onclick="shopMessage('Mentor Tarot 1:1')">
              <span>♙</span>
              <strong>Mentor Tarot 1:1</strong>
              <small>299.000đ — Học và luyện đọc bài.</small>
            </button>
          </div>

          <p id="shopMessage" class="message"></p>
        </section>
      `, "shop");
    }

    window.shopMessage = function(name) {
      document.getElementById("shopMessage").textContent =
        `Bạn đã chọn "${name}". Chức năng thanh toán thật sẽ được kết nối sau.`;
    };

    window.toggleMenu = function() {
      const menu = document.getElementById("avatarMenu");
      if (menu) menu.classList.toggle("hidden");
    };

    window.toggleHeart = function() {
      const heart = document.getElementById("heartBtn");

      if (!heart) return;

      heart.classList.toggle("liked");
      heart.textContent = heart.classList.contains("liked") ? "♥" : "♡";
    };

    window.signOut = async function() {
      await db.auth.signOut();

      currentUser = null;
      currentProfile = null;
      currentView = "auth";
      location.hash = "";
      renderAuth();
    };

    window.addEventListener("hashchange", () => {
      currentView = getHashView();
      render();
    });

    init();
  </script>
</body>
