<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>FreshSpirit</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&family=Lora:wght@400;500;600;700&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    ::selection {
      background: #FFD1DC;
      color: #111;
    }

    ::-moz-selection {
      background: #FFD1DC;
      color: #111;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      overscroll-behavior-x: none;
      -webkit-text-size-adjust: 100%;
    }

    body {
      background: #000;
      color: #111;
      font-family: "Be Vietnam Pro", Arial, Helvetica, sans-serif;
      touch-action: pan-y;
    }

    button,
    input,
    select,
    textarea {
      font-family: "Be Vietnam Pro", Arial, Helvetica, sans-serif;
    }

    button {
      cursor: pointer;
    }

    .hidden {
      display: none !important;
    }

    .app {
      width: min(100%, 390px);
      min-height: 100vh;
      margin: 0 auto;
      padding-bottom: 86px;
      overflow-x: hidden;
      position: relative;
      isolation: isolate;
      background: #f8f7f2;
    }

    .app::before {
      content: "";
      position: fixed;
      inset: 0;
      left: 50%;
      transform: translateX(-50%);
      width: min(100%, 390px);
      min-height: 100dvh;
      z-index: 0;
      pointer-events: none;
      background-color: #f8f7f2;
      background-image:
        linear-gradient(45deg, rgba(0, 0, 0, 0.035) 25%, transparent 25%, transparent 75%, rgba(0, 0, 0, 0.035) 75%),
        linear-gradient(45deg, rgba(0, 0, 0, 0.035) 25%, transparent 25%, transparent 75%, rgba(0, 0, 0, 0.035) 75%);
      background-size: 34px 34px;
      background-position: 0 0, 17px 17px;
    }

    .topbar {
      width: min(94%, 370px);
      min-height: 70px;
      position: fixed;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      background: rgba(247, 247, 245, 0.94);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid #1f1f1f;
      border-radius: 26px;
      padding: 10px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .logo {
      font-family: "Oswald", sans-serif;
      font-size: 29px;
      font-weight: 700;
      letter-spacing: -0.6px;
      line-height: 0.95;
    }

    .tagline {
      font-size: 11px;
      font-weight: 500;
      color: #555;
      margin-top: 5px;
      letter-spacing: -0.1px;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .icon-btn,
    .black-btn,
    .avatar-btn {
      min-height: 34px;
      border: 1px solid #1f1f1f;
      border-radius: 999px;
      font-weight: 700;
      background: #fff;
      color: #111;
    }

    .icon-btn,
    .avatar-btn {
      width: 34px;
      font-size: 17px;
    }

    .black-btn {
      padding: 0 10px;
      background: #111;
      color: #fff;
      font-size: 13px;
      white-space: nowrap;
    }

    .liked {
      background: #111 !important;
      color: #fff !important;
    }

    .menu {
      position: fixed;
      top: 88px;
      right: calc((100vw - min(94vw, 370px)) / 2);
      width: 210px;
      background: #fff;
      border: 1px solid #1f1f1f;
      border-radius: 22px;
      padding: 10px;
      z-index: 80;
    }

    .menu button {
      width: 100%;
      min-height: 40px;
      border: none;
      background: transparent;
      text-align: left;
      font-size: 14px;
      font-weight: 700;
      padding: 8px 10px;
      border-radius: 14px;
    }

    .menu button:hover {
      background: #f1f1ef;
    }

    .menu hr {
      border: none;
      border-top: 1px solid #222;
      margin: 8px 0;
    }

    .page {
      padding: 96px 14px 20px;
      position: relative;
      z-index: 1;
    }

    .card {
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid #1f1f1f;
      border-radius: 26px;
      padding: 20px;
      margin-bottom: 14px;
    }

    .card h1,
    .card h2,
    .journal-entry h2,
    .tarot-item h2,
    .quick-card strong,
    .case-option strong,
    .reader-name,
    .reader-back h2,
    .collab-title {
      font-family: "Lora", serif;
    }

    .card h1 {
      font-size: 28px;
      line-height: 1.08;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
      font-weight: 700;
    }

    .card h2 {
      font-size: 22px;
      line-height: 1.15;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .card p {
      font-size: 14.5px;
      line-height: 1.55;
      color: #333;
      font-weight: 500;
      margin-bottom: 12px;
    }

    .auth-page {
      min-height: 100vh;
      width: min(100%, 390px);
      margin: 0 auto;
      background: #f7f7f5;
      padding: 26px 14px;
      display: grid;
      place-items: center;
    }

    .auth-card {
      width: 100%;
      background: #fff;
      border: 1px solid #1f1f1f;
      border-radius: 30px;
      padding: 24px 18px;
      text-align: center;
    }

    .auth-card h1 {
      font-family: "Lora", serif;
      font-size: 25px;
      margin-bottom: 18px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
    }

    .tabs button {
      flex: 1;
      height: 42px;
      border: 1px solid #1f1f1f;
      border-radius: 999px;
      background: #fff;
      font-weight: 700;
    }

    .tabs .active {
      background: #111;
      color: #fff;
    }

    .form {
      display: grid;
      gap: 10px;
    }

    .form input,
    .form select,
    .form textarea {
      width: 100%;
      border: 1px solid #b9b9b9;
      border-radius: 18px;
      padding: 0 14px;
      font-size: 16px;
      font-weight: 500;
      outline: none;
      background: #fff;
    }

    .form input,
    .form select {
      height: 52px;
    }

    .form textarea {
      min-height: 140px;
      padding: 14px;
      resize: vertical;
      line-height: 1.5;
    }

    .submit {
      width: 100%;
      min-height: 54px;
      border: 1px solid #111;
      border-radius: 18px;
      background: #111;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      margin-top: 8px;
      padding: 12px;
      text-decoration: none;
      display: grid;
      place-items: center;
      text-align: center;
    }

    .white-btn {
      width: 100%;
      min-height: 50px;
      border: 1px solid #111;
      border-radius: 18px;
      background: #fff;
      color: #111;
      font-size: 15px;
      font-weight: 700;
      padding: 10px;
      text-decoration: none;
      display: grid;
      place-items: center;
      text-align: center;
    }

    .mini-btn {
      width: 100%;
      min-height: 36px;
      border: 1px solid #111;
      border-radius: 14px;
      background: #111;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      padding: 8px;
    }

    .message {
      min-height: 22px;
      margin-top: 12px;
      font-size: 14px;
      font-weight: 600;
      line-height: 1.4;
    }

    .birthday-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin: 14px 0;
    }

    .checkbox-list {
      display: grid;
      gap: 10px;
      margin: 14px 0;
      text-align: left;
    }

    .checkbox-list label {
      display: flex;
      gap: 10px;
      align-items: center;
      font-weight: 500;
      font-size: 14px;
      line-height: 1.35;
    }

    .checkbox-list input {
      width: 24px;
      height: 24px;
      accent-color: #111;
    }

    .quick-grid {
      display: grid;
      gap: 10px;
    }

    .quick-card {
      min-height: 92px;
      border: 1px solid #1f1f1f;
      border-radius: 20px;
      background: #fafafa;
      padding: 15px;
      text-align: left;
      display: grid;
      grid-template-columns: 38px 1fr;
      gap: 4px 12px;
    }

    .quick-card span {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      background: #111;
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 19px;
      grid-row: span 2;
    }

    .quick-card strong {
      font-size: 17px;
      line-height: 1.2;
      font-weight: 700;
    }

    .quick-card small {
      color: #555;
      font-size: 13px;
      line-height: 1.4;
      font-weight: 500;
    }

    .fan {
      position: relative;
      height: 184px;
      margin-top: 20px;
      overflow: hidden;
    }

    .fan img {
      position: absolute;
      top: 0;
      left: 50%;
      width: 108px;
      height: 172px;
      object-fit: cover;
      border: none;
      border-radius: 10px;
      background: transparent;
    }

    .fan img:nth-child(1) {
      transform: translateX(-118px) rotate(-10deg);
    }

    .fan img:nth-child(2) {
      transform: translateX(-54px) translateY(-8px);
      z-index: 2;
    }

    .fan img:nth-child(3) {
      transform: translateX(8px) rotate(10deg);
    }

    .featured {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 14px;
    }

    .featured img {
      width: 100%;
      height: 118px;
      object-fit: cover;
      border: none;
      border-radius: 8px;
      background: transparent;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .tarot-item {
      background: #fff;
      border: 1px solid #1f1f1f;
      border-radius: 20px;
      padding: 10px;
      text-align: center;
    }

    .tarot-item img {
      width: 100%;
      height: 204px;
      object-fit: cover;
      border: none;
      border-radius: 9px;
      margin-bottom: 9px;
      background: transparent;
    }

    .tarot-item h2 {
      font-size: 15px;
      margin-bottom: 4px;
      font-weight: 700;
    }

    .tarot-item small {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #555;
      margin-bottom: 8px;
      line-height: 1.35;
    }

    .tarot-item p {
      text-align: left;
      font-size: 13px;
      line-height: 1.45;
      color: #333;
      font-weight: 500;
      margin-top: 8px;
    }

    .tarot-item.meaning-closed p {
      display: none;
    }

    .spread-grid {
      display: grid;
      gap: 9px;
      margin-top: 12px;
    }

    .spread-btn {
      width: 100%;
      border: 1px solid #1f1f1f;
      border-radius: 18px;
      background: #fff;
      padding: 13px;
      text-align: left;
      font-weight: 700;
    }

    .spread-btn.active {
      background: #111;
      color: #fff;
    }

    .spread-btn small {
      display: block;
      margin-top: 5px;
      font-size: 12px;
      line-height: 1.35;
      font-weight: 500;
      opacity: 0.78;
    }

    .case-option {
      width: 100%;
      border: 1px solid #1f1f1f;
      border-radius: 20px;
      background: #fff;
      padding: 15px;
      text-align: left;
      margin-bottom: 10px;
    }

    .case-option strong {
      display: block;
      font-size: 16px;
      margin-bottom: 6px;
      font-weight: 700;
    }

    .case-option small {
      display: block;
      color: #555;
      font-size: 13px;
      line-height: 1.4;
      font-weight: 500;
    }

    .practice-case,
    .info-row {
      border: 1px solid #1f1f1f;
      border-radius: 16px;
      padding: 12px 14px;
      background: #fafafa;
      margin-top: 10px;
      text-align: left;
    }

    .info-row small {
      display: block;
      color: #777;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .info-row strong {
      white-space: pre-wrap;
      font-size: 14px;
      line-height: 1.45;
      font-weight: 600;
    }

    .journal-entry {
      background: #fff;
      border: 1px solid #1f1f1f;
      border-radius: 24px;
      padding: 16px;
      margin-bottom: 14px;
    }

    .date-pill {
      display: inline-block;
      padding: 7px 10px;
      border: 1px solid #1f1f1f;
      border-radius: 999px;
      background: #fafafa;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .journal-card-row {
      display: grid;
      grid-template-columns: 72px 1fr;
      gap: 12px;
      align-items: start;
      margin-top: 12px;
      padding: 12px;
      border: 1px solid #1f1f1f;
      border-radius: 16px;
      background: #fafafa;
    }

    .journal-card-row img {
      width: 72px;
      border: none;
      border-radius: 8px;
      background: transparent;
    }

    .journal-card-row strong {
      display: block;
      font-size: 14px;
      line-height: 1.35;
      margin-bottom: 6px;
    }

    .journal-card-row p {
      font-size: 13px;
      line-height: 1.45;
      margin-bottom: 0;
    }

    .profile-avatar {
      width: 108px;
      height: 108px;
      border: 1px solid #1f1f1f;
      border-radius: 999px;
      margin: 0 auto 16px;
      background: #fafafa;
      overflow: hidden;
      display: grid;
      place-items: center;
      font-size: 42px;
      font-weight: 900;
    }

    .profile-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .social-btn {
      width: 100%;
      min-height: 56px;
      border: 1px solid #1f1f1f;
      border-radius: 18px;
      background: #fff;
      color: #111;
      text-decoration: none;
      display: grid;
      grid-template-columns: 40px 1fr 24px;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      text-align: left;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .social-btn span:first-child {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: #fff;
      color: #111;
      border: 1px solid #111;
    }

    .social-logo {
      width: 22px;
      height: 22px;
      object-fit: contain;
      display: block;
    }

    .book-section {
      display: grid;
      gap: 12px;
    }

    .reader-card {
      width: 100%;
      min-height: 342px;
      perspective: 1000px;
      border: none;
      background: transparent;
      padding: 0;
      text-align: left;
    }

    .reader-inner {
      position: relative;
      width: 100%;
      min-height: 342px;
      transition: transform 0.65s ease;
      transform-style: preserve-3d;
    }

    .reader-card.flipped .reader-inner {
      transform: rotateY(180deg);
    }

    .reader-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border: 1px solid #1f1f1f;
      border-radius: 24px;
      background: #fff;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
    }

    .reader-back {
      transform: rotateY(180deg);
      background: #fff8fb;
    }

    .reader-badge {
      width: fit-content;
      padding: 7px 10px;
      border: 1px solid #111;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      background: #FFD1DC;
      margin-bottom: 12px;
    }

    .reader-name {
      font-size: 25px;
      line-height: 1.08;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .reader-desc {
      font-size: 14.5px;
      line-height: 1.55;
      color: #333;
      font-weight: 500;
    }

    .reader-location {
      margin-top: 14px;
      padding: 12px 14px;
      border: 1px solid #111;
      border-radius: 16px;
      background: #fafafa;
      font-size: 13px;
      font-weight: 600;
    }

    .reader-hint {
      font-size: 12px;
      color: #777;
      font-weight: 600;
      margin-top: 16px;
    }

    .reader-back p {
      font-size: 14.5px;
      line-height: 1.55;
      color: #222;
      margin-bottom: 10px;
    }

    .collab-box {
      border: 1px solid #111;
      border-radius: 24px;
      padding: 20px;
      background: #fff8fb;
      margin-top: 12px;
    }

    .collab-title {
      font-size: 24px;
      line-height: 1.15;
      margin-bottom: 12px;
      font-weight: 700;
    }

    .collab-list {
      display: grid;
      gap: 10px;
      margin: 14px 0;
      list-style: none;
    }

    .collab-list li {
      border: 1px solid #111;
      border-radius: 16px;
      padding: 12px 14px;
      background: #fff;
      font-size: 14px;
      line-height: 1.45;
      font-weight: 500;
    }

    .manual-room-box {
      display: grid;
      gap: 12px;
    }

    .deck-choice {
      width: 100%;
      border: 1px solid #111;
      border-radius: 18px;
      background: #111;
      color: #fff;
      padding: 14px;
      text-align: left;
      font-weight: 700;
    }

    .deck-choice small {
      display: block;
      margin-top: 5px;
      font-size: 12px;
      line-height: 1.35;
      font-weight: 500;
      opacity: 0.82;
    }

    .deck-area {
      display: grid;
      place-items: center;
      margin: 18px 0;
    }

    .deck-pile {
      width: 118px;
      height: 178px;
      border: none;
      background: transparent;
      position: relative;
    }

    .deck-pile:disabled {
      opacity: 0.45;
    }

    .card-back-design {
      width: 100%;
      height: 100%;
      border: 1px solid #111;
      border-radius: 13px;
      background:
        radial-gradient(circle at center, rgba(255, 255, 255, 0.16) 0 18%, transparent 19%),
        linear-gradient(45deg, rgba(255, 255, 255, 0.12) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(255, 255, 255, 0.12) 25%, transparent 25%),
        #111;
      background-size: 100% 100%, 18px 18px, 18px 18px;
      box-shadow:
        5px 5px 0 rgba(0, 0, 0, 0.12),
        10px 10px 0 rgba(0, 0, 0, 0.06);
    }

    .deck-count {
      margin-top: 12px;
      font-size: 13px;
      font-weight: 700;
      color: #333;
      text-align: center;
    }

    .manual-control-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .manual-drawn-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 14px;
    }

    .manual-card-slot {
      display: grid;
      gap: 8px;
    }

    .manual-position-label {
      min-height: 38px;
      border: 1px solid #111;
      border-radius: 14px;
      background: #fff;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 7px 8px;
      font-family: "Lora", serif;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.25;
    }

    .manual-card-visual {
      width: 100%;
      height: 250px;
      border: none;
      background: transparent;
      perspective: 1000px;
      padding: 0;
    }

    .manual-card-visual .manual-flip-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.65s ease;
      transform-style: preserve-3d;
    }

    .manual-card-visual.flipped .manual-flip-inner {
      transform: rotateY(180deg);
    }

    .manual-card-visual .manual-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border: 1px solid #111;
      border-radius: 18px;
      background: #fff;
      padding: 10px;
      overflow: hidden;
    }

    .manual-card-visual .manual-back {
      display: grid;
      place-items: center;
      text-align: center;
    }

    .manual-card-visual .manual-back .card-back-design {
      width: 100%;
      height: 100%;
      box-shadow: none;
    }

    .manual-card-visual .manual-front {
      transform: rotateY(180deg);
      text-align: center;
    }

    .manual-card-visual .manual-front img {
      width: 100%;
      height: 184px;
      object-fit: contain;
      object-position: center;
      border-radius: 10px;
      margin-bottom: 8px;
      background: transparent;
    }

    .manual-card-visual .manual-front h2 {
      font-family: "Lora", serif;
      font-size: 14px;
      line-height: 1.25;
      margin-bottom: 5px;
    }

    .manual-card-visual .manual-front small {
      display: block;
      font-size: 12px;
      line-height: 1.35;
      color: #555;
      font-weight: 600;
    }

    .manual-actions {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .bottom-nav {
      width: min(94%, 370px);
      height: 66px;
      position: fixed;

    function esc(text) {
      return String(text || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function hasBirthday(profile) {
      return profile && profile.birthday_month && profile.birthday_day && profile.birthday_year;
    }

    function birthdayText(profile) {
      if (!hasBirthday(profile)) return "Chưa có sinh nhật";
      return `${profile.birthday_day} / ${profile.birthday_month} / ${profile.birthday_year}`;
    }

    function getHashView() {
      return location.hash.replace("#", "") || "home";

    function pickRandom(array) {
      return array[Math.floor(Math.random() * array.length)];
    }

    function shuffledDeck() {
      if (typeof getAllCards !== "function") return [];

      const deck = [...getAllCards()];

      for (let i = deck.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const temp = deck[i];
        deck[i] = deck[j];
        deck[j] = temp;
      }

      return deck;
    }

    function drawCardsForSpread(spread) {
      const deck = shuffledDeck();

      return spread.positions.map((position, index) => {
        const baseCard = deck[index];

        return {
          ...baseCard,
          position,
          isReversed: Math.random() < 0.25
        };
      });
    }

    function reversedMeaning(card) {
      return `Nghĩa ngược: năng lượng của ${card.viName || card.name} đang bị chặn, lệch hướng hoặc chưa được dùng đúng cách. Nghĩa xuôi gốc: ${card.meaning}`;
    }

    function cardMeaning(card) {
      return card.isReversed ? reversedMeaning(card) : card.meaning;
    }

    function normalizeCards(cards) {
      if (!cards) return [];
      if (Array.isArray(cards)) return cards;

      try {
        return JSON.parse(cards);
      } catch {
        return [];
      }
    }

      const data = await response.json();

    async function handleAuth(event) {

      const password = document.getElementById("password").value.trim();

      if (authMode === "login") {

          email,
          password

        if (error) {

        currentUser = data.user;

      message.textContent = "Đang lưu...";

      const reasons = [...document.querySelectorAll(".checkbox-list input:checked")]
        .map(item => item.value);

      const profileUpdate = {
        birthday_month: Number(document.getElementById("birthMonth").value),
        birthday_day: Number(document.getElementById("birthDay").value),
        birthday_year: Number(document.getElementById("birthYear").value),
        heard_from: document.getElementById("heardFrom").value,
        tiktok_handle: document.getElementById("tiktokHandle").value.trim(),
        updated_at: new Date().toISOString()
      };

      const { error } = await db
        .from("profiles")
        .update(profileUpdate)
        .eq("id", currentUser.id);

      if (error) {
        message.textContent = error.message;
        return;
      }

      if (reasons.length > 0) {
        await db.from("onboarding_answers").insert(
          reasons.map(reason => ({
            user_id: currentUser.id,
            answer: reason
          }))
        );
      }

      await loadProfile();

      currentView = "home";
      location.hash = "home";
      render();

        const message = document.getElementById("manualMessage");
        if (message) message.textContent = "Chưa tìm thấy database 78 lá trong script.js.";

    window.shuffleManualDeck = function() {
      const input = document.getElementById("manualQuestion");
      if (input) roomQuestion = input.value.trim();

      if (typeof getAllCards !== "function") return;

      if (!manualDeck.length && manualDrawnCards.length === 0) {
        manualDeck = shuffledDeck();
      } else {
        for (let i = manualDeck.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          const temp = manualDeck[i];
          manualDeck[i] = manualDeck[j];
          manualDeck[j] = temp;
        }
      }

      manualAiText = "";
      manualFreshText = "";

      renderRoomManual();
    };

    window.resetManualDraw = function() {
      const input = document.getElementById("manualQuestion");
      if (input) roomQuestion = input.value.trim();

      if (typeof getAllCards !== "function") {
        manualDeck = [];
      } else {
        manualDeck = shuffledDeck();
      }

      manualDrawnCards = [];
      manualAiText = "";
      manualFreshText = "";

      renderRoomManual();
    };

    window.drawManualCard = function() {
      if (!manualSpread) manualSpread = SPREADS[1];

      if (!manualDeck.length) {
        manualDeck = shuffledDeck();
      }

      if (manualDrawnCards.length >= manualSpread.positions.length) {
        return;
      }

      const nextCard = manualDeck.shift();

      manualDrawnCards.push({
        ...nextCard,
        position: manualSpread.positions[manualDrawnCards.length],
        isReversed: Math.random() < 0.25,
        isFlipped: false
      });

      manualAiText = "";
      manualFreshText = "";

      renderRoomManual();
    };

    function manualCardHtml(card, index) {
      return `
        <div class="manual-card-slot">
          <div class="manual-position-label">
            ${esc(card.position)}
          </div>

          <button
            id="manualCard${index}"
            class="manual-card-visual ${card.isFlipped ? "flipped" : ""}"
            onclick="flipManualCard(${index})"
          >
            <div class="manual-flip-inner">
              <div class="manual-face manual-back">
                <div class="card-back-design"></div>
              </div>

              <div class="manual-face manual-front">
                <img
                  src="${esc(card.image)}"
                  alt="${esc(card.name)}"
                  style="${card.isReversed ? "transform: rotate(180deg);" : ""}"
                >

                <h2>${esc(card.name)}</h2>

                <small>
                  ${esc(card.viName)}
                  ${card.isReversed ? " · Ngược" : " · Xuôi"}
                </small>
              </div>
            </div>
          </button>
        </div>
      `;
    }

    window.flipManualCard = function(index) {
      const card = manualDrawnCards[index];
      if (!card) return;

      card.isFlipped = true;

      const element = document.getElementById(`manualCard${index}`);
      if (element) element.classList.add("flipped");

      manualAiText = "";
      manualFreshText = "";

      setTimeout(() => {
        renderRoomManual();
      }, 680);
    };

    function manualReadingReady() {
      return (
        manualSpread &&
        manualDrawnCards.length === manualSpread.positions.length &&
        manualDrawnCards.every(card => card.isFlipped)
      );
    }

    window.getManualAI = async function() {
      const box = document.getElementById("manualResultBox");
      const message = document.getElementById("manualActionMessage");

      if (!manualReadingReady()) {
        if (message) message.textContent = "Bạn cần rút đủ lá và lật hết bài trước.";
        return;
      }

      if (box) box.innerHTML = aiBoxHtml("Đang hỏi AI FreshSpirit...");

      try {
        manualAiText = await askGemini(buildManualAIPrompt());
        manualFreshText = "";

        if (box) box.innerHTML = aiBoxHtml(manualAiText);
      } catch (error) {
        if (box) box.innerHTML = aiBoxHtml(error.message);
      }
    };

      const message = document.getElementById("manualActionMessage");

      const lines = manualDrawnCards.map((card, index) => {

Hệ thống FreshSpirit

Câu hỏi: ${roomQuestion || "Không có câu hỏi cụ thể."}

Tổng quan:
Trải bài này cho thấy tình huống cần được nhìn theo mạch: lá đầu tiên là điểm mở, các lá giữa là năng lượng đang vận hành, còn lá cuối cho thấy hướng kết luận hoặc lời khuyên chính.

Các lá bài:
${lines}

Lời khuyên:
Đừng chỉ đọc từng lá riêng lẻ. Hãy nhìn xem các vị trí đang nối với nhau như một câu chuyện: điều gì đang diễn ra, điều gì bị kẹt, và hành động nào giúp bạn đi tiếp rõ ràng hơn.
`.trim();

                  <div>
                    <h2>Reader Huynh Chau</h2>

                  </div>

    window.toggleReaderFlip = function(id) {
      const card = document.getElementById(id);
      if (card) card.classList.toggle("flipped");
    };

    function collabSectionHtml() {
      return `
        <section class="card">
          <h2>Collaborate with FreshSpirit</h2>
          <p>FreshSpirit đang tuyển cộng tác viên xem tarot cho các lượt trải bài trả phí.</p>

          <div class="collab-box">

              <li>Hoa hồng cho mỗi trải bài: <strong>15% - 25%</strong> theo năng lực.</li>

            </ul>

            <a class="submit" href="https://docs.google.com/forms/d/e/1FAIpQLSfcJdRzWbJSwPKzCip8Ve_EhDt4CL_EHXZrNtTBzN46Drm0Tw/viewform" target="_blank">
              Apply here
            </a>
          </div>
        </section>
      `;
    }

    window.toggleMenu = function() {
      const menu = document.getElementById("avatarMenu");
      if (menu) menu.classList.toggle("hidden");
    };

    window.toggleHeart = function() {
      const heart = document.getElementById("heartBtn");

      if (!heart) return;

      heart.classList.toggle("liked");
      heart.textContent = heart.classList.contains("liked") ? "🖤" : "🤍";
    };

    window.signOut = async function() {
      await db.auth.signOut();

      currentUser = null;
      currentProfile = null;
      currentView = "auth";
      location.hash = "";
      renderAuth();
    };

    window.addEventListener("hashchange", () => {
      currentView = getHashView();
      render();
    });

    init();
  </script>
