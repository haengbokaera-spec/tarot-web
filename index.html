<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>FreshSpirit</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&family=Lora:wght@400;500;600;700&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    ::selection {
      background: #FFD1DC;
      color: #111;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      overscroll-behavior-x: none;
      -webkit-text-size-adjust: 100%;
      background: #f7f7f5;
    }

    body {
      color: #111;
      font-family: "Be Vietnam Pro", Arial, Helvetica, sans-serif;
      touch-action: pan-y;
    }

    button,
    input,
    select,
    textarea {
      font-family: "Be Vietnam Pro", Arial, Helvetica, sans-serif;
    }

    button {
      cursor: pointer;
    }

    .hidden {
      display: none !important;
    }

    .app {
      width: min(100%, 390px);
      min-height: 100vh;
      margin: 0 auto;
      background: #f7f7f5;
      padding-bottom: 86px;
      overflow-x: hidden;
      position: relative;
    }

    .topbar {
      width: min(94%, 370px);
      min-height: 70px;
      position: fixed;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      background: rgba(247, 247, 245, 0.97);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid #1f1f1f;
      border-radius: 26px;
      padding: 10px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .logo {
      font-family: "Oswald", sans-serif;
      font-size: 29px;
      font-weight: 700;
      letter-spacing: -0.6px;
      line-height: 0.95;
    }

    .tagline {
      font-size: 11px;
      font-weight: 500;
      color: #555;
      margin-top: 5px;
      letter-spacing: -0.1px;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .icon-btn,
    .black-btn,
    .avatar-btn {
      min-height: 34px;
      border: 1px solid #1f1f1f;
      border-radius: 999px;
      font-weight: 700;
      background: #fff;
      color: #111;
    }

    .icon-btn {
      width: 34px;
      font-size: 17px;
    }

    .black-btn {
      padding: 0 10px;
      background: #111;
      color: #fff;
      font-size: 13px;
      white-space: nowrap;
    }

    .avatar-btn {
      width: 36px;
      height: 36px;
      min-height: 36px;
      padding: 0;
      overflow: hidden;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: #fff;
    }

    .avatar-btn img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .avatar-initial {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      background: #111;
      color: #fff;
      font-size: 14px;
      font-weight: 900;
      line-height: 1;
    }

    .liked {
      background: #111 !important;
      color: #fff !important;
    }

    .menu {
      position: fixed;
      top: 88px;
      right: calc((100vw - min(94vw, 370px)) / 2);
      width: 210px;
      background: #fff;
      border: 1px solid #1f1f1f;
      border-radius: 22px;
      padding: 10px;
      z-index: 10000;
    }

    .menu button {
      width: 100%;
      min-height: 40px;
      border: none;
      background: transparent;
      text-align: left;
      font-size: 14px;
      font-weight: 700;
      padding: 8px 10px;
      border-radius: 14px;
    }

    .menu button:hover {
      background: #f1f1ef;
    }

    .menu hr {
      border: none;
      border-top: 1px solid #222;
      margin: 8px 0;
    }

    .page {
      padding: 96px 14px 20px;
      position: relative;
      z-index: 1;
    }

    .card {
      background: #fff;
      border: 1px solid #1f1f1f;
      border-radius: 26px;
      padding: 20px;
      margin-bottom: 14px;
    }

    .card h1,
    .card h2,
    .journal-entry h2,
    .tarot-item h2,
    .quick-card strong,
    .case-option strong,
    .reader-name,
    .reader-back h2,
    .collab-title {
      font-family: "Lora", serif;
    }

    .card h1 {
      font-size: 28px;
      line-height: 1.08;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
      font-weight: 700;
    }

    .card h2 {
      font-size: 22px;
      line-height: 1.15;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .card p {
      font-size: 14.5px;
      line-height: 1.55;
      color: #333;
      font-weight: 500;
      margin-bottom: 12px;
    }

    .auth-page {
      min-height: 100vh;
      width: min(100%, 390px);
      margin: 0 auto;
      background: #f7f7f5;
      padding: 26px 14px;
      display: grid;
      place-items: center;
    }

    .auth-card {
      width: 100%;
      background: #fff;
      border: 1px solid #1f1f1f;
      border-radius: 30px;
      padding: 24px 18px;
      text-align: center;
    }

    .auth-card h1 {
      font-family: "Lora", serif;
      font-size: 25px;
      margin-bottom: 18px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
    }

    .tabs button {
      flex: 1;
      height: 42px;
      border: 1px solid #1f1f1f;
      border-radius: 999px;
      background: #fff;
      font-weight: 700;
    }

    .tabs .active {
      background: #111;
      color: #fff;
    }

    .form {
      display: grid;
      gap: 10px;
    }

    .form input,
    .form select,
    .form textarea {
      width: 100%;
      border: 1px solid #b9b9b9;
      border-radius: 18px;
      padding: 0 14px;
      font-size: 16px;
      font-weight: 500;
      outline: none;
      background: #fff;
    }

    .form input,
    .form select {
      height: 52px;
    }

    .form textarea {
      min-height: 140px;
      padding: 14px;
      resize: vertical;
      line-height: 1.5;
    }

    .submit {
      width: 100%;
      min-height: 54px;
      border: 1px solid #111;
      border-radius: 18px;
      background: #111;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      margin-top: 8px;
      padding: 12px;
      text-decoration: none;
      display: grid;
      place-items: center;
      text-align: center;
    }

    .white-btn {
      width: 100%;
      min-height: 50px;
      border: 1px solid #111;
      border-radius: 18px;
      background: #fff;
      color: #111;
      font-size: 15px;
      font-weight: 700;
      padding: 10px;
      text-decoration: none;
      display: grid;
      place-items: center;
      text-align: center;
    }

    .mini-btn {
      width: 100%;
      min-height: 36px;
      border: 1px solid #111;
      border-radius: 14px;
      background: #111;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      padding: 8px;
    }

    .message {
      min-height: 22px;
      margin-top: 12px;
      font-size: 14px;
      font-weight: 600;
      line-height: 1.4;
    }

    .birthday-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin: 14px 0;
    }

    .checkbox-list {
      display: grid;
      gap: 10px;
      margin: 14px 0;
      text-align: left;
    }

    .checkbox-list label {
      display: flex;
      gap: 10px;
      align-items: center;
      font-weight: 500;
      font-size: 14px;
      line-height: 1.35;
    }

    .checkbox-list input {
      width: 24px;
      height: 24px;
      accent-color: #111;
    }

    .quick-grid {
      display: grid;
      gap: 10px;
    }

    .quick-card {
      min-height: 92px;
      border: 1px solid #1f1f1f;
      border-radius: 20px;
      background: #fafafa;
      padding: 15px;
      text-align: left;
      display: grid;
      grid-template-columns: 38px 1fr;
      gap: 4px 12px;
    }

    .quick-card span {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      background: #111;
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 19px;
      grid-row: span 2;
    }

    .quick-card strong {
      font-size: 17px;
      line-height: 1.2;
      font-weight: 700;
    }

    .quick-card small {
      color: #555;
      font-size: 13px;
      line-height: 1.4;
      font-weight: 500;
    }

    .home-room-card {
      cursor: pointer;
    }

    .fan {
      position: relative;
      height: 184px;
      margin-top: 20px;
      overflow: hidden;
    }

    .fan img {
      position: absolute;
      top: 0;
      left: 50%;
      width: 108px;
      height: 172px;
      object-fit: contain;
      border: none;
      border-radius: 10px;
      background: transparent;
    }

    .fan img:nth-child(1) {
      transform: translateX(-118px) rotate(-10deg);
    }

    .fan img:nth-child(2) {
      transform: translateX(-54px) translateY(-8px);
      z-index: 2;
    }

    .fan img:nth-child(3) {
      transform: translateX(8px) rotate(10deg);
    }

    .featured {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 14px;
    }

    .featured img {
      width: 100%;
      height: 118px;
      object-fit: contain;
      border: none;
      border-radius: 8px;
      background: transparent;
      padding: 2px;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .tarot-item {
      background: #fff;
      border: 1px solid #1f1f1f;
      border-radius: 20px;
      padding: 10px;
      text-align: center;
    }

    .tarot-item img {
      width: 100%;
      height: auto;
      object-fit: contain;
      object-position: center;
      border: none;
      border-radius: 9px;
      margin-bottom: 9px;
      background: transparent;
      display: block;
    }

    .tarot-item h2 {
      font-size: 15px;
      margin-bottom: 4px;
      font-weight: 700;
    }

    .tarot-item small {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #555;
      margin-bottom: 8px;
      line-height: 1.35;
    }

    .tarot-item p {
      text-align: left;
      font-size: 13px;
      line-height: 1.45;
      color: #333;
      font-weight: 500;
      margin-top: 8px;
    }

    .tarot-flip-card {
      min-height: 360px;
      perspective: 1000px;
      cursor: pointer;
      padding: 0 !important;
      overflow: hidden;
    }

    .tarot-flip-inner {
      position: relative;
      width: 100%;
      min-height: 360px;
      transition: transform 0.65s ease;
      transform-style: preserve-3d;
    }

    .tarot-flip-card.flipped .tarot-flip-inner {
      transform: rotateY(180deg);
    }

    .tarot-flip-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      background: #fff;
      border-radius: 20px;
      padding: 10px;
      overflow: hidden;
    }

    .tarot-flip-front {
      text-align: center;
    }

    .tarot-flip-front img {
      width: 100%;
      height: 260px;
      object-fit: contain;
      object-position: center;
      display: block;
      background: transparent;
      margin-bottom: 8px;
    }

    .tarot-flip-back {
      transform: rotateY(180deg);
      overflow-y: auto;
      text-align: left;
    }

    .tarot-flip-back h2 {
      text-align: center;
      margin-bottom: 8px;
    }

    .meaning-box {
      border: 1px solid #111;
      border-radius: 14px;
      padding: 10px;
      background: #fafafa;
      margin-bottom: 8px;
    }

    .meaning-box strong {
      display: block;
      font-size: 13px;
      margin-bottom: 5px;
    }

    .meaning-box p {
      font-size: 12.5px;
      line-height: 1.45;
      margin: 0;
    }

    .spread-grid {
      display: grid;
      gap: 9px;
      margin-top: 12px;
    }

    .spread-btn {
      width: 100%;
      border: 1px solid #1f1f1f;
      border-radius: 18px;
      background: #fff;
      padding: 13px;
      text-align: left;
      font-weight: 700;
    }

    .spread-btn.active {
      background: #111;
      color: #fff;
    }

    .spread-btn small {
      display: block;
      margin-top: 5px;
      font-size: 12px;
      line-height: 1.35;
      font-weight: 500;
      opacity: 0.78;
    }

    .case-option {
      width: 100%;
      border: 1px solid #1f1f1f;
      border-radius: 20px;
      background: #fff;
      padding: 15px;
      text-align: left;
      margin-bottom: 10px;
    }

    .case-option strong {
      display: block;
      font-size: 16px;
      margin-bottom: 6px;
      font-weight: 700;
    }

    .case-option small {
      display: block;
      color: #555;
      font-size: 13px;
      line-height: 1.4;
      font-weight: 500;
    }

    .practice-case,
    .info-row {
      border: 1px solid #1f1f1f;
      border-radius: 16px;
      padding: 12px 14px;
      background: #fafafa;
      margin-top: 10px;
      text-align: left;
    }

    .info-row small {
      display: block;
      color: #777;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .info-row strong {
      white-space: pre-wrap;
      font-size: 14px;
      line-height: 1.45;
      font-weight: 600;
    }

    .journal-entry {
      background: #fff;
      border: 1px solid #1f1f1f;
      border-radius: 24px;
      padding: 16px;
      margin-bottom: 14px;
    }

    .date-pill {
      display: inline-block;
      padding: 7px 10px;
      border: 1px solid #1f1f1f;
      border-radius: 999px;
      background: #fafafa;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .journal-card-row {
      display: grid;
      grid-template-columns: 72px 1fr;
      gap: 12px;
      align-items: start;
      margin-top: 12px;
      padding: 12px;
      border: 1px solid #1f1f1f;
      border-radius: 16px;
      background: #fafafa;
    }

    .journal-card-row img {
      width: 72px;
      height: auto;
      object-fit: contain;
      border: none;
      border-radius: 8px;
      background: transparent;
    }

    .journal-card-row strong {
      display: block;
      font-size: 14px;
      line-height: 1.35;
      margin-bottom: 6px;
    }

    .journal-card-row p {
      font-size: 13px;
      line-height: 1.45;
      margin-bottom: 0;
    }

    .profile-avatar {
      width: 108px;
      height: 108px;
      border: 1px solid #1f1f1f;
      border-radius: 999px;
      margin: 0 auto 16px;
      background: #fafafa;
      overflow: hidden;
      display: grid;
      place-items: center;
      font-size: 42px;
      font-weight: 900;
    }

    .profile-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .upload-avatar-box {
      width: 100%;
      border: 1px dashed #111;
      border-radius: 18px;
      background: #fafafa;
      padding: 14px;
      text-align: center;
    }

    .upload-avatar-box strong {
      display: block;
      font-size: 14px;
      margin-bottom: 8px;
    }

    .upload-avatar-box small {
      display: block;
      font-size: 12px;
      color: #666;
      line-height: 1.4;
      margin-bottom: 10px;
    }

    .upload-avatar-box input {
      width: 100%;
      height: auto !important;
      padding: 10px !important;
      border-radius: 14px !important;
      background: #fff !important;
    }

    .social-btn {
      width: 100%;
      min-height: 56px;
      border: 1px solid #1f1f1f;
      border-radius: 18px;
      background: #fff;
      color: #111;
      text-decoration: none;
      display: grid;
      grid-template-columns: 40px 1fr 24px;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      text-align: left;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .social-btn span:first-child {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: #fff;
      color: #111;
      border: 1px solid #111;
    }

    .social-logo {
      width: 22px;
      height: 22px;
      object-fit: contain;
      display: block;
    }

    .book-section {
      display: grid;
      gap: 12px;
    }

    .reader-card {
      width: 100%;
      min-height: 342px;
      perspective: 1000px;
      border: none;
      background: transparent;
      padding: 0;
      text-align: left;
    }

    .reader-inner {
      position: relative;
      width: 100%;
      min-height: 342px;
      transition: transform 0.65s ease;
      transform-style: preserve-3d;
    }

    .reader-card.flipped .reader-inner {
      transform: rotateY(180deg);
    }

    .reader-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border: 1px solid #1f1f1f;
      border-radius: 24px;
      background: #fff;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
    }

    .reader-back {
      transform: rotateY(180deg);
      background: #fff8fb;
    }

    .reader-badge {
      width: fit-content;
      padding: 7px 10px;
      border: 1px solid #111;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      background: #FFD1DC;
      margin-bottom: 12px;
    }

    .reader-name {
      font-size: 25px;
      line-height: 1.08;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .reader-desc {
      font-size: 14.5px;
      line-height: 1.55;
      color: #333;
      font-weight: 500;
    }

    .reader-location {
      margin-top: 14px;
      padding: 12px 14px;
      border: 1px solid #111;
      border-radius: 16px;
      background: #fafafa;
      font-size: 13px;
      font-weight: 600;
    }

    .reader-hint {
      font-size: 12px;
      color: #777;
      font-weight: 600;
      margin-top: 16px;
    }

    .reader-back p {
      font-size: 14.5px;
      line-height: 1.55;
      color: #222;
      margin-bottom: 10px;
    }

    .collab-box {
      border: 1px solid #111;
      border-radius: 24px;
      padding: 20px;
      background: #fff8fb;
      margin-top: 12px;
    }

    .collab-title {
      font-size: 24px;
      line-height: 1.15;
      margin-bottom: 12px;
      font-weight: 700;
    }

    .collab-list {
      display: grid;
      gap: 10px;
      margin: 14px 0;
      list-style: none;
    }

    .collab-list li {
      border: 1px solid #111;
      border-radius: 16px;
      padding: 12px 14px;
      background: #fff;
      font-size: 14px;
      line-height: 1.45;
      font-weight: 500;
    }

    .manual-room-box {
      display: grid;
      gap: 12px;
    }

    .deck-choice {
      width: 100%;
      border: 1px solid #111;
      border-radius: 18px;
      background: #111;
      color: #fff;
      padding: 14px;
      text-align: left;
      font-weight: 700;
    }

    .deck-choice small {
      display: block;
      margin-top: 5px;
      font-size: 12px;
      line-height: 1.35;
      font-weight: 500;
      opacity: 0.82;
    }

    .deck-area {
      display: grid;
      place-items: center;
      margin: 18px 0;
    }

    .deck-pile {
      width: 118px;
      height: 178px;
      border: none;
      background: transparent;
      position: relative;
    }

    .deck-pile:disabled {
      opacity: 0.45;
    }

    .card-back-design {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 13px;
      background-color: transparent;
      background-image: url("images/cards/back-new.png");
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      box-shadow: none;
    }

    .deck-count {
      margin-top: 12px;
      font-size: 13px;
      font-weight: 700;
      color: #333;
      text-align: center;
    }

    .manual-control-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .manual-drawn-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 14px;
    }

    .manual-card-slot {
      display: grid;
      gap: 8px;
    }

    .manual-position-label {
      min-height: 38px;
      border: 1px solid #111;
      border-radius: 14px;
      background: #fff;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 7px 8px;
      font-family: "Lora", serif;
      font-size: 14px;
      font-weight: 700;

    function randomDeckCards(count) {
      if (typeof getAllCards !== "function") return [];

      const deck = [...getAllCards()];

      for (let i = deck.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const temp = deck[i];
        deck[i] = deck[j];
        deck[j] = temp;
      }

      return deck.slice(0, count);
    }

    function pickRandom(array) {
      return array[Math.floor(Math.random() * array.length)];
    }

    function shuffledDeck() {
      if (typeof getAllCards !== "function") return [];

      const deck = [...getAllCards()];

      for (let i = deck.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const temp = deck[i];
        deck[i] = deck[j];
        deck[j] = temp;
      }

      return deck;
    }

    function drawCardsForSpread(spread) {
      const deck = shuffledDeck();

      return spread.positions.map((position, index) => {
        const baseCard = deck[index];

        return {
          ...baseCard,
          position,
          isReversed: Math.random() < 0.25
        };
      });
    }

    function reversedMeaning(card) {
      return `Nghĩa ngược: năng lượng của ${card.viName || card.name} đang bị chặn, lệch hướng hoặc chưa được dùng đúng cách. Nghĩa xuôi gốc: ${card.meaning}`;
    }

    function cardMeaning(card) {
      return card.isReversed ? reversedMeaning(card) : card.meaning;
    }

    function normalizeCards(cards) {
      if (!cards) return [];
      if (Array.isArray(cards)) return cards;

      try {
        return JSON.parse(cards);
      } catch {
        return [];
      }
    }

    async function handleAuth(event) {
      event.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const authMessage = document.getElementById("authMessage");

      if (password.length < 6) {
        authMessage.textContent = "Mật khẩu phải có ít nhất 6 ký tự.";
        return;
      }

      if (authMode === "login") {
        authMessage.textContent = "Đang đăng nhập...";

        const { data, error } = await db.auth.signInWithPassword({
          email,
          password
        });

        if (error) {
          authMessage.textContent = error.message;
          return;
        }

        currentUser = data.user;
        await loadProfile();

        currentView = hasBirthday(currentProfile) ? "home" : "onboarding";
        location.hash = currentView;
        render();
        return;
      }

      const displayName = document.getElementById("displayName").value.trim() || "Người dùng FreshSpirit";

      authMessage.textContent = "Đang tạo tài khoản...";

      const { data, error } = await db.auth.signUp({
        email,
        password,
        options: {
          data: {
            display_name: displayName
          }
        }
      });

      if (error) {
        authMessage.textContent = error.message;
        return;
      }

      if (!data.session) {
        authMessage.textContent = "Tài khoản đã tạo nhưng chưa đăng nhập được. Kiểm tra Supabase đã tắt Confirm email chưa.";
        return;
      }

      currentUser = data.user;

      await db.from("profiles").upsert({
        id: currentUser.id,
        email: currentUser.email,
        display_name: displayName,
        updated_at: new Date().toISOString()
      });

      await loadProfile();

      currentView = "onboarding";
      location.hash = "onboarding";
      render();
    }

      event.preventDefault();

      const message = document.getElementById("onboardingMessage");
      message.textContent = "Đang lưu...";

      const reasons = [...document.querySelectorAll(".checkbox-list input:checked")]
        .map(item => item.value);

      const profileUpdate = {
        birthday_month: Number(document.getElementById("birthMonth").value),
        birthday_day: Number(document.getElementById("birthDay").value),
        birthday_year: Number(document.getElementById("birthYear").value),
        heard_from: document.getElementById("heardFrom").value,
        tiktok_handle: document.getElementById("tiktokHandle").value.trim(),
        updated_at: new Date().toISOString()
      };

      const { error } = await db
        .from("profiles")
        .update(profileUpdate)
        .eq("id", currentUser.id);

      if (error) {
        message.textContent = error.message;
        return;
      }

      if (reasons.length > 0) {
        await db.from("onboarding_answers").insert(
          reasons.map(reason => ({
            user_id: currentUser.id,
            answer: reason
          }))
        );
      }

      await loadProfile();

      currentView = "home";
      location.hash = "home";
      render();
    }

      manualSpread = SPREADS.find(spread => spread.id === spreadId) || SPREADS[1];

    window.startManualDraw = function() {
      const input = document.getElementById("manualQuestion");
      if (input) roomQuestion = input.value.trim();

      if (typeof getAllCards !== "function") {
        const message = document.getElementById("manualMessage");
        if (message) message.textContent = "Chưa tìm thấy database 78 lá trong script.js.";
        return;
      }

      manualDeck = shuffledDeck();
      manualDrawnCards = [];
      manualAiText = "";
      manualFreshText = "";

      renderRoomManual();
    };

    window.shuffleManualDeck = function() {
      const input = document.getElementById("manualQuestion");
      if (input) roomQuestion = input.value.trim();

      if (typeof getAllCards !== "function") return;

      if (!manualDeck.length && manualDrawnCards.length === 0) {
        manualDeck = shuffledDeck();
      } else {
        for (let i = manualDeck.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          const temp = manualDeck[i];
          manualDeck[i] = manualDeck[j];
          manualDeck[j] = temp;
        }
      }

      manualAiText = "";
      manualFreshText = "";

      renderRoomManual();
    };

    window.resetManualDraw = function() {
      const input = document.getElementById("manualQuestion");
      if (input) roomQuestion = input.value.trim();

      if (typeof getAllCards !== "function") {
        manualDeck = [];
      } else {
        manualDeck = shuffledDeck();
      }

      manualDrawnCards = [];
      manualAiText = "";
      manualFreshText = "";

      renderRoomManual();
    };

    window.drawManualCard = function() {
      if (!manualSpread) manualSpread = SPREADS[1];

      if (!manualDeck.length) {
        manualDeck = shuffledDeck();
      }

      if (manualDrawnCards.length >= manualSpread.positions.length) {
        return;
      }

      const nextCard = manualDeck.shift();

      manualDrawnCards.push({
        ...nextCard,
        position: manualSpread.positions[manualDrawnCards.length],
        isReversed: Math.random() < 0.25,
        isFlipped: false
      });

      manualAiText = "";
      manualFreshText = "";

      renderRoomManual();
    };

    function manualCardHtml(card, index) {
      return `
        <div class="manual-card-slot">

            ${esc(card.position)}

          <button
            id="manualCard${index}"
            class="manual-card-visual ${card.isFlipped ? "flipped" : ""}"
            onclick="flipManualCard(${index})"
          >
            <div class="manual-flip-inner">
              <div class="manual-face manual-back">
                <div class="card-back-design"></div>
              </div>

              <div class="manual-face manual-front">
                <img
                  src="${esc(card.image)}"
                  alt="${esc(card.name)}"
                  style="${card.isReversed ? "transform: rotate(180deg);" : ""}"
                >

                <h2>${esc(card.name)}</h2>

                <small>
                  ${esc(card.viName)}
                  ${card.isReversed ? " · Ngược" : " · Xuôi"}
                </small>
              </div>
            </div>
          </button>
        </div>
      `;
    }

    window.flipManualCard = function(index) {
      const card = manualDrawnCards[index];
      if (!card) return;

      card.isFlipped = true;

      const element = document.getElementById(`manualCard${index}`);
      if (element) element.classList.add("flipped");

      manualAiText = "";
      manualFreshText = "";

      setTimeout(() => {
        renderRoomManual();
      }, 680);
    };

    function manualReadingReady() {
      return (
        manualSpread &&
        manualDrawnCards.length === manualSpread.positions.length &&
        manualDrawnCards.every(card => card.isFlipped)
      );
    }

    window.getManualAI = async function() {
      const box = document.getElementById("manualResultBox");
      const message = document.getElementById("manualActionMessage");

      if (!manualReadingReady()) {
        if (message) message.textContent = "Bạn cần rút đủ lá và lật hết bài trước.";

      if (!manualReadingReady()) {

    async function saveProfile(event) {
      event.preventDefault();

      const message = document.getElementById("profileMessage");
      message.textContent = "Đang lưu...";

      let avatarUrl = currentProfile.avatar_url || "";

      const avatarInput = document.getElementById("profileAvatarFile");
      const avatarFile = avatarInput && avatarInput.files && avatarInput.files[0]
        ? avatarInput.files[0]
        : null;

      if (avatarFile) {
        const allowedTypes = ["image/png", "image/jpeg", "image/jpg", "image/webp"];

        if (!allowedTypes.includes(avatarFile.type)) {
          message.textContent = "Ảnh phải là PNG, JPG, JPEG hoặc WEBP.";
          return;
        }

        if (avatarFile.size > 5 * 1024 * 1024) {
          message.textContent = "Ảnh đại diện tối đa 5MB.";
          return;
        }

        message.textContent = "Đang upload ảnh đại diện...";

        const fileExt = avatarFile.name.split(".").pop().toLowerCase() || "png";
        const filePath = `${currentUser.id}/avatar-${Date.now()}.${fileExt}`;

        const { error: uploadError } = await db.storage
          .from("avatars")
          .upload(filePath, avatarFile, {
            cacheControl: "3600",
            upsert: true,
            contentType: avatarFile.type
          });

        if (uploadError) {
          message.textContent = uploadError.message;
          return;
        }

        const { data: publicData } = db.storage
          .from("avatars")
          .getPublicUrl(filePath);

        avatarUrl = publicData.publicUrl;
      }

      const updates = {
        display_name: document.getElementById("profileName").value.trim() || "Người dùng FreshSpirit",
        avatar_url: avatarUrl,
        tiktok_handle: document.getElementById("profileTiktok").value.trim(),
        heard_from: document.getElementById("profileHeardFrom").value,
        updated_at: new Date().toISOString()
      };

      message.textContent = "Đang cập nhật hồ sơ...";

      const { error } = await db
        .from("profiles")
        .update(updates)
        .eq("id", currentUser.id);

      if (error) {
        message.textContent = error.message;
        return;
      }

      await loadProfile();
      renderProfile();
    }

function feedSectionHtml() {
  return `
    <section class="card">
      <h2>FreshSpirit Feed</h2>
      <p>Không gian chia sẻ bài viết, hình ảnh, tarot thoughts và những khoảnh khắc nhỏ giống một mạng xã hội mini.</p>

        <input id="feedImageFile" type="file" accept="image/png, image/jpeg, image/jpg, image/webp">
        <button class="submit" onclick="createFeedPost()">Post</button>
      </div>

      <p id="feedMessage" class="message"></p>
    </section>

    <section id="feedProfileBox"></section>

    <section id="feedList">
      <section class="card">
        <p class="message">Đang tải Feed...</p>
      </section>
    </section>
  `;
}

async function createFeedPost() {
  const contentInput = document.getElementById("feedContent");
  const imageInput = document.getElementById("feedImageFile");
  const message = document.getElementById("feedMessage");

  const content = contentInput.value.trim();
  const imageFile = imageInput.files && imageInput.files[0] ? imageInput.files[0] : null;

  if (!content && !imageFile) {
    message.textContent = "Viết gì đó hoặc chọn ảnh trước khi post.";
    return;
  }

  let imageUrl = "";

  if (imageFile) {
    const allowedTypes = ["image/png", "image/jpeg", "image/jpg", "image/webp"];

    if (!allowedTypes.includes(imageFile.type)) {
      message.textContent = "Ảnh phải là PNG, JPG, JPEG hoặc WEBP.";
      return;
    }

    if (imageFile.size > 10 * 1024 * 1024) {
      message.textContent = "Ảnh tối đa 10MB.";
      return;
    }

    message.textContent = "Đang upload ảnh...";

    const fileExt = imageFile.name.split(".").pop().toLowerCase() || "png";
    const filePath = `${currentUser.id}/feed-${Date.now()}.${fileExt}`;

    const { error: uploadError } = await db.storage
      .from("feed-images")
      .upload(filePath, imageFile, {
        cacheControl: "3600",
        upsert: true,
        contentType: imageFile.type
      });

    if (uploadError) {
      message.textContent = uploadError.message;
      return;
    }

    const { data: publicData } = db.storage
      .from("feed-images")
      .getPublicUrl(filePath);

    imageUrl = publicData.publicUrl;
  }

  message.textContent = "Đang đăng bài...";

  const { error } = await db.from("feed_posts").insert({
    user_id: currentUser.id,
    content,
    image_url: imageUrl
  });

  if (error) {
    message.textContent = error.message;
    return;
  }

  contentInput.value = "";
  imageInput.value = "";
  message.textContent = "Đã đăng bài.";

  loadFeedPosts();
}

async function loadFeedPosts() {
  const feedList = document.getElementById("feedList");
  if (!feedList) return;

  const { data, error } = await db
    .from("feed_posts")
    .select(`
      *,
      profiles:user_id (
        id,
        display_name,
        avatar_url,
        email
      ),
      feed_likes (
        user_id
      ),
      feed_comments (
        id
      )
    `)
    .order("created_at", { ascending: false })
    .limit(50);

  if (error) {
    feedList.innerHTML = `
      <section class="card">
        <p>${esc(error.message)}</p>
      </section>
    `;
    return;
  }

  if (!data || data.length === 0) {
    feedList.innerHTML = `
      <section class="card">
        <h2>Feed còn trống</h2>
        <p>Hãy là người đầu tiên đăng bài trong FreshSpirit Feed.</p>
      </section>
    `;
    return;
  }

  feedList.innerHTML = data.map(post => feedPostHtml(post)).join("");

  if (expandedCommentsPostId) {
    loadComments(expandedCommentsPostId);
  }
}

function feedPostHtml(post) {
  const profile = post.profiles || {};
  const displayName = profile.display_name || "Người dùng FreshSpirit";
  const avatarUrl = profile.avatar_url || "";
  const liked = (post.feed_likes || []).some(item => item.user_id === currentUser.id);
  const likeCount = (post.feed_likes || []).length;
  const commentCount = (post.feed_comments || []).length;

  return `
    <article class="feed-post-card">
      <div class="feed-author">
        <button onclick="openPublicProfile('${esc(post.user_id)}')">
          <div class="feed-avatar">
            ${
              avatarUrl
                ? `<img src="${esc(avatarUrl)}" alt="Avatar">`
                : esc(displayName.charAt(0).toUpperCase())
            }
          </div>
        </button>

        <button onclick="openPublicProfile('${esc(post.user_id)}')">
          <div class="feed-name">${esc(displayName)}</div>
          <div class="feed-time">${new Date(post.created_at).toLocaleString("vi-VN")}</div>
        </button>

        ${
          post.user_id === currentUser.id
            ? `<button class="feed-action-btn" onclick="deleteFeedPost(${post.id})">Xoá</button>`
            : ""
        }
      </div>

      ${post.content ? `<div class="feed-content">${esc(post.content)}</div>` : ""}
      ${post.image_url ? `<img class="feed-image" src="${esc(post.image_url)}" alt="Feed image">` : ""}

      <div class="feed-actions">
        <button class="feed-action-btn ${liked ? "active" : ""}" onclick="toggleFeedLike(${post.id})">
          ${liked ? "♥" : "♡"} ${likeCount}
        </button>

        <button class="feed-action-btn" onclick="toggleComments(${post.id})">
          💬 ${commentCount}
        </button>
      </div>

      <div id="commentsBox${post.id}" class="feed-comments hidden"></div>
    </article>
  `;
}

async function toggleFeedLike(postId) {
  const { data } = await db
    .from("feed_likes")
    .select("post_id")
    .eq("post_id", postId)
    .eq("user_id", currentUser.id)
    .maybeSingle();

  if (data) {
    await db
      .from("feed_likes")
      .delete()
      .eq("post_id", postId)
      .eq("user_id", currentUser.id);
  } else {
    await db
      .from("feed_likes")
      .insert({
        post_id: postId,
        user_id: currentUser.id
      });
  }

  loadFeedPosts();
}

async function deleteFeedPost(postId) {
  const sure = confirm("Xoá bài viết này?");
  if (!sure) return;

  await db
    .from("feed_posts")
    .delete()
    .eq("id", postId)
    .eq("user_id", currentUser.id);

  loadFeedPosts();
}

window.toggleComments = async function(postId) {
  const box = document.getElementById(`commentsBox${postId}`);
  if (!box) return;

  if (expandedCommentsPostId === postId && !box.classList.contains("hidden")) {
    box.classList.add("hidden");
    expandedCommentsPostId = null;
    return;
  }

  expandedCommentsPostId = postId;
  await loadComments(postId);
};

async function loadComments(postId) {
  const box = document.getElementById(`commentsBox${postId}`);
  if (!box) return;

  box.classList.remove("hidden");
  box.innerHTML = `<p class="message">Đang tải bình luận...</p>`;

  const { data, error } = await db
    .from("feed_comments")
    .select(`
      *,
      profiles:user_id (
        id,
        display_name,
        avatar_url
      )
    `)
    .eq("post_id", postId)
    .order("created_at", { ascending: true });

  if (error) {
    box.innerHTML = `<p>${esc(error.message)}</p>`;
    return;
  }

  box.innerHTML = `
    <div class="form">
      <input id="commentInput${postId}" type="text" placeholder="Viết bình luận...">
      <button class="white-btn" onclick="createComment(${postId})">Bình luận</button>
    </div>

    <div style="margin-top:12px;">
      ${
        data && data.length
          ? data.map(comment => `
              <div class="comment-item">
                <strong>${esc(comment.profiles?.display_name || "Người dùng FreshSpirit")}</strong>
                <p>${esc(comment.content)}</p>
              </div>
            `).join("")
          : `<p class="message">Chưa có bình luận.</p>`
      }
    </div>
  `;
}

window.createComment = async function(postId) {
  const input = document.getElementById(`commentInput${postId}`);
  const content = input.value.trim();

  if (!content) return;

  await db.from("feed_comments").insert({
    post_id: postId,
    user_id: currentUser.id,
    content
  });

  input.value = "";
  await loadComments(postId);
  await loadFeedPosts();
};

window.openPublicProfile = async function(profileId) {
  const box = document.getElementById("feedProfileBox");
  if (!box) return;

  box.innerHTML = `
    <section class="feed-profile-card">
      <p class="message">Đang tải profile...</p>
    </section>
  `;

  const { data: profile, error } = await db
    .from("profiles")
    .select("id, display_name, avatar_url, email, tiktok_handle, heard_from")
    .eq("id", profileId)
    .maybeSingle();

  if (error || !profile) {
    box.innerHTML = `
      <section class="feed-profile-card">
        <p>Không tìm thấy profile.</p>
      </section>
    `;
    return;
  }

  const { count: followerCount } = await db
    .from("follows")
    .select("*", { count: "exact", head: true })
    .eq("following_id", profileId);

  const { count: followingCount } = await db
    .from("follows")
    .select("*", { count: "exact", head: true })
    .eq("follower_id", profileId);

  const { data: followed } = await db
    .from("follows")
    .select("follower_id")
    .eq("follower_id", currentUser.id)
    .eq("following_id", profileId)
    .maybeSingle();

  const isMe = profileId === currentUser.id;

  box.innerHTML = `
    <section class="feed-profile-card">
      <div class="feed-profile-avatar">
        ${
          profile.avatar_url
            ? `<img src="${esc(profile.avatar_url)}" alt="Avatar">`
            : esc((profile.display_name || "F").charAt(0).toUpperCase())
        }
      </div>

      <h2>${esc(profile.display_name || "Người dùng FreshSpirit")}</h2>
      <p>${esc(profile.email || "")}</p>

      <div class="info-row">
        <small>Followers</small>
        <strong>${followerCount || 0}</strong>
      </div>

      <div class="info-row">
        <small>Following</small>
        <strong>${followingCount || 0}</strong>
      </div>

      <div class="info-row">
        <small>TikTok</small>
        <strong>${esc(profile.tiktok_handle || "Chưa thêm")}</strong>
      </div>

      ${
        isMe
          ? `<button class="white-btn" onclick="closePublicProfile()" style="margin-top:12px;">Đóng profile</button>`
          : `
            <button class="submit" onclick="toggleFollow('${esc(profileId)}')" style="margin-top:12px;">
              ${followed ? "Đang follow · Bấm để unfollow" : "Follow"}
            </button>

            <button class="white-btn" onclick="closePublicProfile()" style="margin-top:10px;">
              Đóng profile
            </button>
          `
      }
    </section>
  `;
};

window.toggleFollow = async function(profileId) {

  if (data) {
    await db
      .from("follows")

    await db
      .from("follows")

};
