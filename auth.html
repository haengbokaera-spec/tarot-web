<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>FreshSpirit - Đăng nhập</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body class="app-body">
  <header class="mobile-header">
    <div>
      <a href="index.html" class="app-logo">FreshSpirit</a>
      <p>A new place for tarot</p>
    </div>

    <div class="header-actions">
      <button id="loginTab" class="outline-btn active-tab" type="button">
        Log in
      </button>

      <button id="signupTab" class="black-btn" type="button">
        Sign up
      </button>
    </div>
  </header>

  <main class="auth-page">
    <section class="auth-card">
      <h1 id="authTitle">Đăng nhập FreshSpirit</h1>

      <button class="invite-btn" type="button">
        enter your invitation code
      </button>

      <form id="authForm" class="auth-form">
        <input
          id="displayNameInput"
          class="hidden"
          type="text"
          placeholder="Tên hiển thị"
          autocomplete="name"
        />

        <input
          id="emailInput"
          type="email"
          placeholder="Email"
          autocomplete="email"
          required
        />

        <input
          id="passwordInput"
          type="password"
          placeholder="Mật khẩu"
          autocomplete="current-password"
          required
        />

        <small>Mật khẩu tối thiểu 6 ký tự</small>

        <button id="submitBtn" class="submit-btn" type="submit">
          Đăng nhập
        </button>
      </form>

      <p class="or-text">or</p>

      <button id="googleBtn" class="google-btn" type="button">
        <span class="google-icon">G</span>
        Continue with Google
      </button>

      <p class="auth-note">
        FreshSpirit đang dùng đăng nhập bằng email trước. Google login sẽ được bật sau.
      </p>

      <button id="switchAuthBtn" class="switch-auth" type="button">
        Chưa có tài khoản? Đăng ký
      </button>

      <p id="authMessage" class="auth-message"></p>
    </section>
  </main>

  <button class="help-btn">?</button>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>

  <script>
    let authMode = "login";

    const loginTab = document.getElementById("loginTab");
    const signupTab = document.getElementById("signupTab");
    const authTitle = document.getElementById("authTitle");
    const authForm = document.getElementById("authForm");
    const displayNameInput = document.getElementById("displayNameInput");
    const emailInput = document.getElementById("emailInput");
    const passwordInput = document.getElementById("passwordInput");
    const submitBtn = document.getElementById("submitBtn");
    const switchAuthBtn = document.getElementById("switchAuthBtn");
    const authMessage = document.getElementById("authMessage");
    const googleBtn = document.getElementById("googleBtn");

    function setMode(mode) {
      authMode = mode;
      authMessage.textContent = "";

      if (mode === "login") {
        authTitle.textContent = "Đăng nhập FreshSpirit";
        submitBtn.textContent = "Đăng nhập";
        switchAuthBtn.textContent = "Chưa có tài khoản? Đăng ký";

        displayNameInput.classList.add("hidden");
        displayNameInput.removeAttribute("required");

        loginTab.classList.add("active-tab");
        signupTab.classList.remove("active-tab");
      } else {
        authTitle.textContent = "Tạo tài khoản FreshSpirit";
        submitBtn.textContent = "Tạo tài khoản";
        switchAuthBtn.textContent = "Đã có tài khoản? Đăng nhập";

        displayNameInput.classList.remove("hidden");
        displayNameInput.setAttribute("required", "required");

        signupTab.classList.add("active-tab");
        loginTab.classList.remove("active-tab");
      }
    }

    async function routeAfterAuth(user) {
      const { data: profile } = await db
        .from("profiles")
        .select("birthday_month, birthday_day, birthday_year")
        .eq("id", user.id)
        .maybeSingle();

      const hasBirthday =
        profile &&
        profile.birthday_month &&
        profile.birthday_day &&
        profile.birthday_year;

      if (hasBirthday) {
        window.location.href = "home.html";
      } else {
        window.location.href = "onboarding.html";
      }
    }

    async function checkAlreadyLoggedIn() {
      const { data } = await db.auth.getUser();

      if (data.user) {
        await routeAfterAuth(data.user);
      }
    }

    async function handleLogin(email, password) {
      authMessage.textContent = "Đang đăng nhập...";

      const { data, error } = await db.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        authMessage.textContent = error.message;
        return;
      }

      await routeAfterAuth(data.user);
    }

    async function handleSignup(email, password, displayName) {
      authMessage.textContent = "Đang tạo tài khoản...";

      const { data, error } = await db.auth.signUp({
        email,
        password,
        options: {
          data: {
            display_name: displayName
          }
        }
      });

      if (error) {
        authMessage.textContent = error.message;
        return;
      }

      if (!data.session) {
        authMessage.textContent =
          "Tài khoản đã tạo nhưng chưa đăng nhập được. Kiểm tra lại Supabase đã tắt Confirm email chưa.";
        return;
      }

      const { error: profileError } = await db.from("profiles").upsert({
        id: data.user.id,
        email: data.user.email || email,
        display_name: displayName,
        updated_at: new Date().toISOString()
      });

      if (profileError) {
        authMessage.textContent = profileError.message;
        return;
      }

      window.location.href = "onboarding.html";
    }

    authForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();
      const displayName = displayNameInput.value.trim() || "Người dùng FreshSpirit";

      if (!email || !password) {
        authMessage.textContent = "Nhập đủ email và mật khẩu.";
        return;
      }

      if (password.length < 6) {
        authMessage.textContent = "Mật khẩu phải có ít nhất 6 ký tự.";
        return;
      }

      if (authMode === "signup") {
        await handleSignup(email, password, displayName);
      } else {
        await handleLogin(email, password);
      }
    });

    loginTab.addEventListener("click", () => {
      setMode("login");
    });

    signupTab.addEventListener("click", () => {
      setMode("signup");
    });

    switchAuthBtn.addEventListener("click", () => {
      if (authMode === "login") {
        setMode("signup");
      } else {
        setMode("login");
      }
    });

    googleBtn.addEventListener("click", () => {
      authMessage.textContent = "Google login sẽ được bật sau.";
    });

    setMode("login");
    checkAlreadyLoggedIn();
  </script>
</body>
</html>
